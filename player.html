<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUIZ PLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; text-align: center; }
        
        /* TOP PROGRESS BAR (FROM DRAWING) */
        #timer-container { width: 100%; height: 15px; background: #1e293b; position: fixed; top: 0; left: 0; }
        #timer-bar { width: 100%; height: 100%; background: #22c55e; transition: none; }

        .screen { display: none; padding: 20px; flex-direction: column; justify-content: center; height: 100%; }
        .screen.active { display: flex; }

        /* QUESTION TEXT (FROM DRAWING) */
        #q-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; line-height: 1.2; }

        /* BUTTONS (FROM DRAWING - BIG AND COLORFUL) */
        .choices-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .btn-choice { 
            padding: 22px; border-radius: 18px; border: 3px solid #334155; 
            font-size: 1.4rem; font-weight: 800; color: white; transition: 0.2s; 
            text-align: left; display: flex; align-items: center; gap: 15px;
        }
        .btn-choice:active { transform: scale(0.95); }
        .btn-choice:disabled { opacity: 0.4; }
        .letter-box { background: white; color: black; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 1.2rem; }

        /* COLORS FOR BUTTONS */
        .btn-A { background: #ef4444; } .btn-B { background: #3b82f6; } 
        .btn-C { background: #10b981; } .btn-D { background: #f59e0b; }
        .btn-E { background: #8b5cf6; } .btn-F { background: #ec4899; }

        #break-screen { background: #8b5cf6; }
    </style>
</head>
<body>
    <div id="timer-container"><div id="timer-bar"></div></div>

    <div id="waiting" class="screen active">
        <h1 style="font-size: 3rem;">WAITING FOR HOST</h1>
        <p style="opacity: 0.6;">Get ready to play!</p>
    </div>

    <div id="break-screen" class="screen">
        <h1 style="font-size: 3rem;">BREAK TIME</h1>
        <p>Intermission - relax!</p>
    </div>

    <div id="quiz-screen" class="screen">
        <h2 id="q-title">Question</h2>
        <div id="choices-container" class="choices-grid"></div>
    </div>

    <div id="text-screen" class="screen">
        <h2>TYPE ANSWER</h2>
        <input type="text" id="t-ans" style="padding:20px; border-radius:15px; width:90%; font-size:1.5rem; text-align:center;">
        <button onclick="submitText()" class="btn-choice btn-B" style="margin-top:20px; justify-content:center;">SUBMIT</button>
    </div>

    <script>
        let ws, room = location.pathname.split('/')[2], user = localStorage.getItem('quiz_user'), hasAns = false;
        
        ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/player/${user}`);
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if(msg.type === "PREP") setupQ(msg.payload);
            if(msg.type === "START") startTimer(msg.payload.limit);
            if(msg.type === "STOP") lock();
            if(msg.type === "BREAK") show('break-screen');
        };

        function setupQ(q) {
            hasAns = false;
            document.getElementById('timer-bar').style.transition = 'none';
            document.getElementById('timer-bar').style.width = '100%';
            show(q.type === 'text' ? 'text-screen' : 'quiz-screen');
            document.getElementById('q-title').innerText = q.title;
            const c = document.getElementById('choices-container'); c.innerHTML = "";
            q.choices.forEach((choice, i) => {
                const char = String.fromCharCode(65 + i);
                const b = document.createElement('button');
                b.className = `btn-choice btn-${char}`;
                b.innerHTML = `<div class="letter-box">${char}</div> <span>${choice}</span>`;
                b.onclick = () => { if(!hasAns) submit(char, b); };
                c.appendChild(b);
            });
        }

        function startTimer(sec) {
            const b = document.getElementById('timer-bar');
            b.style.transition = `width ${sec}s linear`;
            setTimeout(() => { b.style.width = '0%'; }, 100);
        }

        function submit(ans, btn) {
            if(hasAns) return; hasAns = true;
            ws.send(JSON.stringify({type:"ANSWER", payload:{answer: ans}}));
            lock(); btn.style.border = "6px solid white";
        }

        function submitText() {
            if(hasAns) return; hasAns = true;
            ws.send(JSON.stringify({type:"ANSWER", payload:{answer: document.getElementById('t-ans').value}}));
            lock();
        }

        function lock() { document.querySelectorAll('.btn-choice').forEach(b => b.disabled = true); }
        function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
