<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Player</title>
    <style>
        :root { --bg: #0B0E14; --cyan: #00E5FF; --pink: #FF007F; --green: #00E676; --red: #FF1744; --card: #151B23; --gold: #FFD700; }
        body { background: var(--bg); color: #FFF; font-family: 'Inter', sans-serif; margin: 0; display:flex; flex-direction:column; height: 100vh; overflow-x: hidden;}
        
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin: 15px; border: 1px solid #333; position: relative;}
        input, select, button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 8px; border: none; font-weight: bold; font-size: 1.1rem; box-sizing: border-box; }
        button { cursor: pointer; transition: 0.2s; }
        
        /* Answer Blocks */
        .btn-ans { background: #222; color: #FFF; text-align: left; position: relative; border: 2px solid transparent; }
        .btn-ans.selected { border-color: var(--cyan); background: #112; }
        
        /* Color-Coded Results */
        .btn-ans.correct { background: var(--green); color: #000; border-color: var(--green); }
        .btn-ans.wrong { background: var(--red); color: #FFF; border-color: var(--red); }
        .btn-ans.glow-correct { border: 2px solid var(--green); box-shadow: 0 0 15px var(--green); background: #000; color: #FFF;}
        
        /* Sequence Badges */
        .seq-badge { position: absolute; right: 15px; top: 15px; background: var(--cyan); color: #000; border-radius: 50%; width: 25px; height: 25px; text-align: center; line-height: 25px; font-weight: bold; display:none; }
        
        /* Header & Visuals */
        #header-bar { padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; color: #000; position:relative;}
        #prog-text { text-align: center; color: var(--cyan); font-size: 0.9rem; margin-top: 10px; font-weight:bold;}
        #time-bar-bg { width: 100%; height: 10px; background: #333; border-radius: 5px; margin-top: 15px; overflow: hidden; }
        #time-bar { width: 100%; height: 100%; background: var(--green); transition: width 1s linear; }
        
        /* Translucent Leaderboard Overlay */
        #lb-overlay { position: fixed; top: 60px; left: 0; width: 100%; height: calc(100% - 60px); background: rgba(11,14,20,0.95); z-index: 100; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px); overflow-y:auto; }
        .lb-row { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333; font-weight:bold;}
        
        /* Underdog Button */
        .underdog-btn { background: var(--gold); color: #000; display: none; margin-bottom: 15px; box-shadow: 0 0 10px var(--gold);}
        
        .hidden { display: none !important; }
        
        /* Settings Gear */
        #settings-gear { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); width: auto; padding: 5px 10px; font-size: 1.2rem; color: #FFF; z-index:200;}
        #lb-toggle-btn { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); width: auto; padding: 5px 10px; font-size: 1rem; color: #FFF; z-index:200; border:1px solid #FFF;}
    </style>
</head>
<body>

    <div id="setup" class="card" style="margin-top:15vh;">
        <h2 style="color:var(--cyan); text-align:center;">Join Quiz</h2>
        <input type="text" id="r" placeholder="4-Digit Room Code" inputmode="numeric">
        <input type="text" id="t" placeholder="Team Name">
        
        <select id="col">
            <option value="#FF1744">Neon Red</option>
            <option value="#00E5FF" selected>Electric Cyan</option>
            <option value="#FF007F">Hot Pink</option>
            <option value="#00E676">Toxic Green</option>
            <option value="#FFD700">Solid Gold</option>
            <option value="#9D00FF">Deep Purple</option>
            <option value="#FF6D00">Blaze Orange</option>
            <option value="#00B0FF">Sky Blue</option>
            <option value="#F50057">Magenta</option>
            <option value="#76FF03">Acid Lime</option>
        </select>
        
        <select id="bz">
            <option value="https://actions.google.com/sounds/v1/alarms/air_horn.ogg">Stadium Air Horn</option>
            <option value="https://actions.google.com/sounds/v1/cartoon/clown_horn.ogg">Clown Horn</option>
            <option value="https://actions.google.com/sounds/v1/science_fiction/robot_blaster.ogg">Laser Blaster</option>
            <option value="https://actions.google.com/sounds/v1/alarms/boxing_bell.ogg">Boxing Bell</option>
            <option value="https://actions.google.com/sounds/v1/animals/dog_barking.ogg">Barking Dog</option>
            <option value="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg">Cartoon Boing</option>
            <option value="https://actions.google.com/sounds/v1/animals/rooster_crowing.ogg">Rooster Crow</option>
            <option value="https://actions.google.com/sounds/v1/water/glass_smash.ogg">Glass Smash</option>
            <option value="https://actions.google.com/sounds/v1/foley/cash_register_ka_ching.ogg">Cash Register</option>
            <option value="https://actions.google.com/sounds/v1/science_fiction/alien_spaceship_flyby.ogg">UFO Spaceship</option>
        </select>
        
        <button onclick="join()" style="background:var(--pink); color:#fff; margin-top:15px;">ENTER LOBBY</button>
    </div>

    <div id="game" class="hidden" style="flex:1; display:flex; flex-direction:column;">
        
        <div id="header-bar">
            <button id="lb-toggle-btn" onclick="document.getElementById('lb-overlay').classList.toggle('hidden')">🏆 Ranks</button>
            <span id="team-name-disp">Team Name</span>
            <button id="settings-gear" onclick="toggleHaptics()">⚙️</button>
        </div>
        
        <div id="prog-text">Waiting to start...</div>
        
        <div id="lb-overlay" class="hidden">
            <h2 style="color:var(--cyan); margin-top:0; text-align:center;">Live Leaderboard</h2>
            <div id="lb-content"></div>
            <button onclick="document.getElementById('lb-overlay').classList.add('hidden')" style="background:var(--pink); color:#fff; margin-top:20px;">Close Overlay</button>
        </div>
        
        <div id="q-area" class="card">
            <h3 id="q-txt" style="margin-top:0; text-align:center;">Waiting for Host...</h3>
            <div id="q-media" style="text-align:center;"></div>
            <div id="time-bar-bg"><div id="time-bar"></div></div>
        </div>

        <div id="input-area" class="card hidden">
            <button id="ud-btn" class="underdog-btn" onclick="useUnderdog()">⚡ RISK IT (3X)</button>
            <div id="choices"></div>
            <input type="text" id="ans-in" class="hidden" placeholder="Type answer here..." autocapitalize="off" autocomplete="off">
            <div style="display:flex; gap:10px;">
                <button id="res-btn" class="hidden" style="background:#444; color:#fff; width:30%;" onclick="resetSeq()">Restart</button>
                <button id="sub-btn" onclick="send()" style="background:var(--cyan); color:#000; flex:1;">SUBMIT</button>
            </div>
        </div>
    </div>
    
    <script>
        let ws, myName, curAns = "", qType = "", tInt, hapticsOn = true, seqCount = 0;
        let usingUD = false;
        let cachedTeams = {};

        // Memory Persistence
        if(localStorage.getItem('haptics') === 'off') hapticsOn = false;

        function toggleHaptics() { 
            hapticsOn = !hapticsOn; 
            localStorage.setItem('haptics', hapticsOn ? 'on' : 'off');
            alert("Vibration/Haptics: " + (hapticsOn ? "ON" : "OFF")); 
        }
        function vibe(p) { if(hapticsOn && navigator.vibrate) navigator.vibrate(p); }

        async function join() {
            const r = document.getElementById('r').value; 
            myName = document.getElementById('t').value;
            if(!r || !myName) return alert("Please enter Room Code and Team Name");

            document.getElementById('team-name-disp').innerText = myName;
            document.getElementById('header-bar').style.background = document.getElementById('col').value;
            
            // 🚨 REPLACE THIS URL
            ws = new WebSocket(`wss://YOUR-RENDER-URL.onrender.com/ws/${r}/player/${myName}`);
            
            ws.onopen = () => {
                ws.send(JSON.stringify({
                    type:"JOIN_SETTINGS", 
                    color:document.getElementById('col').value, 
                    buzzer:document.getElementById('bz').value
                }));
                setInterval(() => { if(ws.readyState===1) ws.send(JSON.stringify({type:"PING"})); }, 20000); // Heartbeat
            };

            ws.onmessage = (e) => {
                const m = JSON.parse(e.data); 
                if(m.type !== "UP") return;
                
                cachedTeams = m.teams;
                const me = m.teams[myName];
                if(!me) return; // Team not found

                // Update Progress & Leaderboard
                document.getElementById('prog-text').innerText = `Question ${m.q_idx+1} of ${m.total_q} | Score: ${me.s}`;
                updateLeaderboardOverlay(m.teams);

                // State Machine
                if(m.status === "active") render(m.q, m.teams, me, m.underdog_allowed);
                if(m.status === "locked") lockUI();
                if(m.status === "revealed_player") showRes(me, m.q);
                if(m.status === "idle" || m.status === "lobby" || m.status === "break") {
                    if(m.status === "break") document.getElementById('q-txt').innerHTML = "☕ <br> Take a break! <br><br> Check the leaderboard overlay.";
                    else resetUI();
                }
            };
            document.getElementById('setup').classList.add('hidden'); 
            document.getElementById('game').classList.remove('hidden');
        }

        function updateLeaderboardOverlay(teams) {
            const sorted = Object.entries(teams).sort((a,b)=>b[1].s-a[1].s);
            let h = "";
            sorted.forEach(([n, t], i) => {
                h += `<div class="lb-row" style="color:${n === myName ? 'var(--cyan)' : '#FFF'}">
                        <span>${i+1}. ${n}</span>
                        <span>${t.s} pts</span>
                      </div>`;
            });
            document.getElementById('lb-content').innerHTML = h;
        }

        function render(q, teams, me, ud_allowed) {
            if(!q) return;
            resetUI();
            document.getElementById('q-txt').innerText = q.title;
            qType = q.type.replace('jackpot_', '');
            document.getElementById('input-area').classList.remove('hidden');
            
            // Media Rendering
            const mBox = document.getElementById('q-media'); 
            mBox.innerHTML = "";
            if(q.med && q.med.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
                mBox.innerHTML = `<img src="${q.med}" style="max-width:100%; border-radius:10px;">`;
            }
            
            // Timer Animation Trigger (CSS handles the shrink)
            document.getElementById('time-bar').style.width = "100%";
            setTimeout(() => { document.getElementById('time-bar').style.width = "0%"; }, 100); 

            // Underdog Logic (Must be rank 4+ and unlocked by master)
            const rank = Object.entries(teams).sort((a,b)=>b[1].s-a[1].s).findIndex(x=>x[0]===myName) + 1;
            if(ud_allowed && rank >= 4 && !me.u_used) {
                document.getElementById('ud-btn').style.display = 'block';
            }

            // Input Generation
            if(qType === 'multi' || qType === 'sequence') {
                let h = "";
                q.choices.split('|').forEach((c, i) => { 
                    if(c.trim()){ 
                        const L = String.fromCharCode(65+i); 
                        h += `<button class="btn-ans" id="btn-${L}" onclick="sel('${L}', this)">${c}<span class="seq-badge" id="bdg-${L}"></span></button>`; 
                    } 
                });
                document.getElementById('choices').innerHTML = h;
                if(qType === 'sequence') document.getElementById('res-btn').classList.remove('hidden');
            } else { 
                document.getElementById('ans-in').classList.remove('hidden'); 
            }
        }

        function sel(L, el) {
            vibe(30);
            if(qType === 'sequence') {
                if(curAns.includes(L)) return;
                curAns += L; 
                seqCount++;
                el.classList.add('selected');
                document.getElementById(`bdg-${L}`).innerText = seqCount;
                document.getElementById(`bdg-${L}`).style.display = 'block';
            } else {
                document.querySelectorAll('.btn-ans').forEach(b=>b.classList.remove('selected'));
                el.classList.add('selected'); 
                curAns = L;
            }
        }

        function resetSeq() { 
            curAns = ""; 
            seqCount = 0; 
            document.querySelectorAll('.btn-ans').forEach(b => { 
                b.classList.remove('selected'); 
                b.querySelector('.seq-badge').style.display='none'; 
            }); 
            vibe(30); 
        }

        function useUnderdog() { 
            if(confirm("Use your ONE-TIME 3X multiplier?")) { 
                usingUD = true; 
                document.getElementById('ud-btn').style.background = "var(--green)"; 
                document.getElementById('ud-btn').innerText = "⚡ RISK ACTIVE";
            } 
        }

        function send() {
            let a = (qType === 'multi' || qType === 'sequence') ? curAns : document.getElementById('ans-in').value;
            if(!a) return;
            
            ws.send(JSON.stringify({type: "ANS", ans: a, underdog: usingUD}));
            
            document.getElementById('sub-btn').innerText = "SENT"; 
            document.getElementById('sub-btn').disabled = true;
            document.getElementById('sub-btn').style.background = "#555";
            document.getElementById('sub-btn').style.color = "#FFF";
            vibe(50);
        }

        function lockUI() {
            document.getElementById('sub-btn').disabled = true; 
            document.getElementById('sub-btn').innerText = "TIME'S UP";
            document.getElementById('sub-btn').style.background = "var(--red)";
            document.getElementById('time-bar').style.width = "0%";
            document.querySelectorAll('.btn-ans').forEach(b => b.onclick = null); // disable changing answers
        }

        function showRes(me, q) {
            const last = me.h[me.h.length-1];
            if(!last) return;
            
            if(qType === 'multi') {
                const actualBtn = document.getElementById(`btn-${last.correct_ans}`);
                if(last.is_c) {
                    document.getElementById(`btn-${last.ans}`).classList.add('correct');
                    vibe([50, 100, 50]); // Win Double Pulse
                } else {
                    if(document.getElementById(`btn-${last.ans}`)) {
                        document.getElementById(`btn-${last.ans}`).classList.add('wrong');
                    }
                    if(actualBtn) actualBtn.classList.add('glow-correct'); // The fix requested
                    vibe(400); // Lose Long Pulse
                }
            } else if (qType === 'sequence') {
                document.getElementById('q-txt').innerHTML = last.is_c 
                    ? `<span style="color:var(--green)">CORRECT SEQUENCE!</span>` 
                    : `<span style="color:var(--red)">INCORRECT</span><br>Correct Order: ${last.correct_ans}`;
                vibe(last.is_c ? [50, 100, 50] : 400);
            } else {
                document.getElementById('q-txt').innerHTML = last.is_c 
                    ? `<span style="color:var(--green)">CORRECT!</span>` 
                    : `<span style="color:var(--red)">INCORRECT</span><br>Answer was: ${last.correct_ans}`;
                vibe(last.is_c ? [50, 100, 50] : 400);
            }
        }

        function resetUI() {
            document.getElementById('q-txt').innerText = "Waiting for Host...";
            document.getElementById('q-media').innerHTML = "";
            document.getElementById('input-area').classList.add('hidden');
            
            document.getElementById('sub-btn').disabled = false; 
            document.getElementById('sub-btn').innerText = "SUBMIT";
            document.getElementById('sub-btn').style.background = "var(--cyan)";
            document.getElementById('sub-btn').style.color = "#000";
            
            document.getElementById('ans-in').value = ""; 
            document.getElementById('ans-in').classList.add('hidden');
            
            document.getElementById('choices').innerHTML = ""; 
            document.getElementById('res-btn').classList.add('hidden');
            
            document.getElementById('ud-btn').style.display = 'none'; 
            document.getElementById('ud-btn').style.background = 'var(--gold)';
            document.getElementById('ud-btn').innerText = "⚡ RISK IT (3X)";
            
            curAns = ""; 
            seqCount = 0; 
            usingUD = false; 
            document.getElementById('time-bar').style.width = "100%";
        }
    </script>
</body>
</html>
