<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAYER | LIVE QUIZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; text-align: center; }
        #timer-bar { height: 12px; background: #22c55e; width: 100%; transition: none; box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
        .screen { display: none; padding: 30px; flex-direction: column; justify-content: center; height: 100%; animation: fadeIn 0.3s ease; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn { background: #1e293b; border: 3px solid #334155; color: white; padding: 25px; margin: 12px 0; border-radius: 20px; font-size: 1.3rem; font-weight: 800; width: 100%; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }
        input { padding: 20px; border-radius: 15px; border: 2px solid #334155; width: 90%; background: #1e293b; color: white; font-size: 1.5rem; text-align: center; }
        #break-screen { background: #8b5cf6; }
    </style>
</head>
<body>
    <div id="timer-bar"></div>

    <div id="waiting" class="screen active"><h1>Get Ready!</h1><p>Syncing with Host...</p></div>
    
    <div id="break-screen" class="screen">
        <h1 style="font-size: 3rem; font-weight: 800;">INTERMISSION</h1>
        <p>The host has paused the game. Relax!</p>
    </div>

    <div id="quiz-screen" class="screen">
        <h2 id="q-title" style="margin-bottom: 40px; font-size: 2rem;">Question</h2>
        <div id="choices-container"></div>
    </div>

    <div id="input-screen" class="screen">
        <h2 id="i-title">Answer</h2>
        <input type="text" id="user-input" placeholder="Type here...">
        <button onclick="submitInput()" class="btn" style="background: #6366f1; margin-top: 20px;">Submit Answer</button>
    </div>

    <div id="results-screen" class="screen"><h1>Quiz Complete!</h1><div id="final-rank"></div></div>

    <script>
        let ws, room = location.pathname.split('/')[2], user = localStorage.getItem('quiz_user'), hasAnswered = false;
        
        ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/player/${user}`);
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if(msg.type === "PREP") setupQuestion(msg.payload);
            if(msg.type === "START") startTimer(msg.payload.limit);
            if(msg.type === "STOP") lockUI();
            if(msg.type === "BREAK") showScreen('break-screen');
            if(msg.type === "RESULTS") showResults(msg.payload);
        };

        function setupQuestion(q) {
            hasAnswered = false; // ANTI-CHEAT RESET
            const bar = document.getElementById('timer-bar');
            bar.style.transition = 'none'; bar.style.width = '100%';
            if(q.type === 'multi' || q.type === 'sequence') {
                showScreen('quiz-screen');
                document.getElementById('q-title').innerText = q.title;
                const container = document.getElementById('choices-container');
                container.innerHTML = "";
                q.choices.forEach((choice, i) => {
                    const b = document.createElement('button');
                    b.className = "btn"; b.innerText = choice;
                    b.onclick = () => { if(!hasAnswered) submit(String.fromCharCode(65+i), b); };
                    container.appendChild(b);
                });
            } else {
                showScreen('input-screen');
                document.getElementById('i-title').innerText = q.title;
                document.getElementById('user-input').value = "";
                document.getElementById('user-input').disabled = false;
            }
        }

        function startTimer(sec) {
            const bar = document.getElementById('timer-bar');
            bar.style.transition = `width ${sec}s linear`; // SYNC TIMER FIX
            setTimeout(() => { bar.style.width = '0%'; }, 100);
        }

        function submit(ans, btn) {
            if(hasAnswered) return; // ANTI-CHEAT LOCK
            hasAnswered = true;
            ws.send(JSON.stringify({type:"ANSWER", payload:{answer: ans}}));
            lockUI();
            if(btn) { btn.style.borderColor = "#6366f1"; btn.style.background = "#0f172a"; }
        }

        function submitInput() {
            const val = document.getElementById('user-input').value;
            if(!val || hasAnswered) return;
            submit(val.toUpperCase());
            document.getElementById('user-input').disabled = true;
        }

        function lockUI() {
            document.querySelectorAll('.btn').forEach(b => b.disabled = true);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showResults(data) {
            showScreen('results-screen');
            const res = document.getElementById('final-rank');
            res.innerHTML = "";
            Object.entries(data).sort((a,b)=>b[1]-a[1]).forEach(([n,s], i) => {
                res.innerHTML += `<div style="padding:15px; border-bottom:1px solid #334155; font-size:1.2rem;">#${i+1} ${n}: <span style="color:#6366f1; font-weight:800;">${s} pts</span></div>`;
            });
        }
    </script>
</body>
</html>
