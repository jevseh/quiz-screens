<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: manipulation; overscroll-behavior: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .color-btn.selected { border: 4px solid white; transform: scale(1.1); }
        .color-btn.taken { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        .ans-btn { transition: all 0.2s ease; }
        .ans-btn.selected { background-color: #3b82f6; border-color: #60a5fa; transform: scale(0.98); }
        .ans-btn.correct-reveal { background-color: #22c55e !important; border-color: #16a34a !important; color: white !important; }
        .ans-btn.wrong-reveal { background-color: #ef4444 !important; border-color: #dc2626 !important; opacity: 0.6; }
        .text-correct-reveal { border-color: #22c55e !important; color: #22c55e !important; }
        .seq-badge { position: absolute; top: -10px; right: -10px; background: #fbbf24; color: black; font-weight: bold; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2px solid #0f172a; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .animate-slide { animation: slideIn 0.4s ease-out forwards; }
        #progress-bar { transition: width 1s linear; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="flex-1 overflow-y-auto p-6 flex flex-col items-center">
        <h1 class="text-4xl font-black mt-8 mb-8 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 text-center">JOIN QUIZ</h1>
        <div class="w-full max-w-sm space-y-4">
            <input type="text" id="room-code" placeholder="4-Letter Room Code" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-600 text-center text-xl font-bold uppercase tracking-widest outline-none focus:border-blue-500">
            <input type="text" id="team-name" placeholder="Team Name" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-600 text-center text-xl font-bold outline-none focus:border-blue-500">
            <button onclick="checkRoomAndLoadBuzzers()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-xl mt-4 transition">Next step: Pick Buzzer</button>
        </div>
        <div id="buzzer-setup" class="w-full max-w-sm mt-8 hidden flex-col items-center pb-12">
            <h3 class="text-lg font-bold mb-4 text-slate-300">1. Pick Team Color</h3>
            <div id="color-grid" class="grid grid-cols-5 gap-3 mb-8 w-full"></div>
            <h3 class="text-lg font-bold mb-4 text-slate-300">2. Pick Buzzer Sound</h3>
            <select id="sound-select" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-600 font-bold mb-8 text-white outline-none focus:border-blue-500">
                <option value="sound1">Sound 1</option><option value="sound2">Sound 2</option><option value="sound3">Sound 3</option><option value="sound4">Sound 4</option><option value="sound5">Sound 5</option>
                <option value="sound6">Sound 6</option><option value="sound7">Sound 7</option><option value="sound8">Sound 8</option><option value="sound9">Sound 9</option><option value="sound10">Sound 10</option>
                <option value="sound11">Sound 11</option><option value="sound12">Sound 12</option><option value="sound13">Sound 13</option><option value="sound14">Sound 14</option><option value="sound15">Sound 15</option>
                <option value="sound16">Sound 16</option><option value="sound17">Sound 17</option><option value="sound18">Sound 18</option><option value="sound19">Sound 19</option><option value="sound20">Sound 20</option>
            </select>
            <button onclick="joinGame()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black text-xl py-4 rounded-xl shadow-lg shadow-blue-500/50">ENTER GAME</button>
        </div>
    </div>

    <div id="game-screen" class="hidden h-full flex flex-col relative">
        <header class="glass-panel p-4 flex justify-between items-center shadow-md z-10">
            <div>
                <span class="text-xs text-slate-400 block uppercase font-bold tracking-wider">Team</span>
                <span id="display-team" class="text-xl font-black"></span>
            </div>
            <div class="text-right">
                <span class="text-xs text-slate-400 block uppercase font-bold tracking-wider">Score</span>
                <span id="display-score" class="text-2xl font-black text-blue-400">0</span>
            </div>
        </header>

        <div id="waiting-state" class="flex-1 flex flex-col items-center justify-center p-6 text-center w-full">
            <div id="waiting-spinner" class="animate-pulse w-24 h-24 mb-6 rounded-full border-4 border-blue-500 flex items-center justify-center">
                <span class="text-4xl">⏳</span>
            </div>
            <h2 id="waiting-text" class="text-2xl font-bold text-slate-300 mb-2">Waiting for Quizmaster</h2>
            <p id="waiting-subtext" class="text-slate-500 mb-6">Eyes on the big screen!</p>
            
            <div id="player-leaderboard" class="hidden w-full max-w-sm bg-slate-800 rounded-xl border border-slate-700 p-4 shadow-xl">
                <h3 class="text-xl font-black mb-4 text-blue-400 border-b border-slate-700 pb-2">Current Standings</h3>
                <div id="leaderboard-list" class="space-y-3 text-left"></div>
            </div>
        </div>

        <main id="question-state" class="hidden flex-1 flex flex-col p-4 overflow-y-auto">
            <div class="w-full bg-slate-800 h-2 rounded-full mb-6 overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-full w-full"></div>
            </div>
            <div class="flex justify-between items-end mb-4">
                <span id="q-number" class="text-slate-400 font-bold text-xl"></span>
                <button id="fastpass-btn" onclick="toggleFastPass()" class="hidden bg-purple-600 px-4 py-2 rounded-lg text-xs font-black tracking-wider shadow shadow-purple-900/50 transition">⚡ FAST PASS</button>
            </div>
            <h2 id="q-text" class="text-2xl font-black mb-4 leading-snug"></h2>
            <div id="q-media" class="mb-6 rounded-lg overflow-hidden flex justify-center"></div>
            <div id="input-area" class="flex-1 flex flex-col space-y-3 pb-24"></div>
        </main>

        <footer id="controls-footer" class="hidden fixed bottom-0 left-0 right-0 glass-panel p-4 border-t border-slate-700 flex space-x-3">
            <button onclick="redoSelection()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-4 rounded-xl font-bold text-slate-300">REDO</button>
            <button onclick="submitAnswer()" class="flex-[2] bg-green-600 hover:bg-green-500 py-4 rounded-xl font-black text-xl shadow-lg shadow-green-900/50">SUBMIT</button>
        </footer>
        
        <div id="submitted-overlay" class="hidden absolute inset-0 bg-slate-900/95 z-50 flex flex-col items-center justify-center backdrop-blur-sm">
            <span class="text-6xl mb-4">✅</span>
            <h2 class="text-3xl font-black text-green-400">Answer Locked!</h2>
            <p class="text-slate-400 mt-2">Waiting for time to expire...</p>
        </div>

        <div id="locked-overlay" class="hidden absolute inset-0 bg-red-900/95 z-50 flex flex-col items-center justify-center backdrop-blur-sm">
            <span class="text-6xl mb-4">⏱️</span>
            <h2 class="text-3xl font-black text-white">Time's Up!</h2>
            <p class="text-red-200 mt-2">Waiting for answers to be revealed...</p>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://my-pub-quiz.onrender.com';
        const WS_URL = 'wss://my-pub-quiz.onrender.com/ws/player/';
        
        let ws;
        let roomCode = "";
        let teamName = "";
        let selectedColor = "";
        let selectedSound = "";
        
        let currentQuestion = null;
        let currentSelections = [];
        let isFastPassActive = false;
        let hasFastPassRemaining = true; 
        let teamRank = 1;
        
        const colors = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e', '#10b981', '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899', '#f43f5e', '#ffffff', '#94a3b8', '#fbbf24', '#34d399', '#818cf8'];

        const colorGrid = document.getElementById('color-grid');
        colors.forEach(color => {
            const btn = document.createElement('div');
            btn.className = 'color-btn w-full aspect-square rounded-full cursor-pointer shadow-md';
            btn.style.backgroundColor = color;
            btn.onclick = () => selectColor(btn, color);
            colorGrid.appendChild(btn);
        });

        async function checkRoomAndLoadBuzzers() {
            roomCode = document.getElementById('room-code').value.toUpperCase();
            teamName = document.getElementById('team-name').value.trim();
            if(roomCode.length !== 4 || teamName === "") { alert("Valid 4-letter code and team name required."); return; }
            try {
                const res = await fetch(`${BACKEND_URL}/api/room/${roomCode}`);
                const data = await res.json();
                if(data.status === "exists") {
                    const takenColors = Object.values(data.unavailable_buzzers).map(b => b.color);
                    document.querySelectorAll('.color-btn').forEach(btn => {
                        if(takenColors.includes(btn.style.backgroundColor)) btn.classList.add('taken');
                    });
                    document.getElementById('buzzer-setup').classList.remove('hidden');
                    document.getElementById('buzzer-setup').classList.add('flex');
                    document.getElementById('room-code').disabled = true;
                    document.getElementById('team-name').disabled = true;
                } else { alert("Room not found."); }
            } catch (err) { alert("Server connection error."); }
        }

        function selectColor(element, color) {
            if(element.classList.contains('taken')) return;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
            element.classList.add('selected');
            selectedColor = color;
        }

        function joinGame() {
            if(!selectedColor) { alert("Pick a team color!"); return; }
            selectedSound = document.getElementById('sound-select').value;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-team').innerText = teamName;
            document.getElementById('display-team').style.color = selectedColor;
            connectWebSocket();
        }

        function connectWebSocket() {
            ws = new WebSocket(`${WS_URL}${roomCode}/${encodeURIComponent(teamName)}`);
            ws.onopen = () => {
                ws.send(JSON.stringify({ action: "select_buzzer", color: selectedColor, sound: selectedSound }));
                setInterval(() => { if(ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({action: "heartbeat"})); }, 15000);
            };
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === "new_question") {
                    renderQuestion(data.data, data.timer, data.allow_fastpass);
                } else if (data.type === "score_update") {
                    updateScore(data.scores);
                } else if (data.type === "end_question") {
                    lockScreen();
                } else if (data.type === "reveal_answer") {
                    highlightAnswers(data.correct);
                } else if (data.type === "break_started") {
                    showBreakLeaderboard(data.leaderboard);
                } else if (data.type === "break_ended") {
                    showWaitingState("Break over. Get ready!");
                } else if (data.type === "quiz_ended") {
                    showWaitingState(`QUIZ OVER! Winner: ${data.winner}`);
                }
            };
            ws.onclose = () => { showWaitingState("Reconnecting..."); setTimeout(connectWebSocket, 3000); };
        }

        function updateScore(scores) {
            if(scores[teamName] !== undefined) document.getElementById('display-score').innerText = scores[teamName];
            const sortedTeams = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            teamRank = sortedTeams.findIndex(t => t[0] === teamName) + 1;
        }

        function showWaitingState(msg = "Waiting for Quizmaster") {
            document.getElementById('question-state').classList.add('hidden');
            document.getElementById('controls-footer').classList.add('hidden');
            document.getElementById('submitted-overlay').classList.add('hidden');
            document.getElementById('locked-overlay').classList.add('hidden');
            document.getElementById('waiting-state').classList.remove('hidden');
            document.getElementById('waiting-text').innerText = msg;
            document.getElementById('waiting-subtext').classList.remove('hidden');
            document.getElementById('waiting-spinner').classList.remove('hidden');
            document.getElementById('player-leaderboard').classList.add('hidden');
        }

        function showBreakLeaderboard(scores) {
            showWaitingState("Time for a break!");
            document.getElementById('waiting-subtext').classList.add('hidden');
            document.getElementById('waiting-spinner').classList.add('hidden');
            
            const lbContainer = document.getElementById('player-leaderboard');
            const lbList = document.getElementById('leaderboard-list');
            lbContainer.classList.remove('hidden');
            lbList.innerHTML = "";
            
            const sortedTeams = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            sortedTeams.forEach(([team, score], index) => {
                const rankColors = index === 0 ? 'text-yellow-400' : index === 1 ? 'text-slate-300' : index === 2 ? 'text-amber-600' : 'text-slate-400';
                lbList.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-900 p-3 rounded-lg border border-slate-700">
                        <span class="font-bold ${rankColors}">${index + 1}. ${team}</span>
                        <span class="font-black text-white">${score}</span>
                    </div>`;
            });
        }

        function renderQuestion(q, customTime, allowFastPass) {
            currentQuestion = q;
            currentSelections = [];
            isFastPassActive = false;
            
            document.getElementById('waiting-state').classList.add('hidden');
            document.getElementById('submitted-overlay').classList.add('hidden');
            document.getElementById('locked-overlay').classList.add('hidden');
            document.getElementById('question-state').classList.remove('hidden');
            document.getElementById('controls-footer').classList.remove('hidden');
            
            document.getElementById('q-number').innerText = `Q${q['Question number']}`;
            document.getElementById('q-text').innerText = q['Question'];

            const fpBtn = document.getElementById('fastpass-btn');
            if(teamRank > 3 && hasFastPassRemaining && allowFastPass) {
                fpBtn.classList.remove('hidden');
                fpBtn.classList.remove('bg-yellow-400', 'text-black');
                fpBtn.classList.add('bg-purple-600', 'text-white');
            } else {
                fpBtn.classList.add('hidden');
            }

            const mediaDiv = document.getElementById('q-media');
            if(q['Media LINK'] && (q['Media LINK'].includes('.jpg') || q['Media LINK'].includes('.png') || q['Media LINK'].includes('.gif'))) {
                mediaDiv.innerHTML = `<img src="${q['Media LINK']}" class="w-full h-auto rounded-lg shadow-md border-2 border-slate-700">`;
            } else {
                mediaDiv.innerHTML = "";
            }

            const inputArea = document.getElementById('input-area');
            inputArea.innerHTML = "";

            const qType = q['Question type'].toLowerCase();
            const options = ['Answer A', 'Answer B', 'Answer C', 'Answer D', 'Answer E', 'Answer F'].map(k => q[k]).filter(v => v);

            if (qType.includes('text') || qType.includes('math')) {
                const inputType = qType.includes('math') ? 'number' : 'text';
                inputArea.innerHTML = `<input type="${inputType}" id="text-answer" class="w-full p-6 text-2xl rounded-xl bg-slate-800 border-2 border-slate-600 focus:border-blue-500 text-center font-bold outline-none animate-slide">`;
            } else {
                options.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'ans-btn w-full p-4 rounded-xl bg-slate-800 border-2 border-slate-700 text-left font-semibold text-lg relative animate-slide';
                    btn.style.animationDelay = `${index * 0.05}s`;
                    btn.innerText = opt;
                    btn.dataset.letter = String.fromCharCode(65 + index); 
                    
                    if(qType.includes('sequence')) btn.onclick = () => handleSequenceClick(btn, btn.dataset.letter);
                    else btn.onclick = () => handleMultipleChoiceClick(btn, btn.dataset.letter);
                    inputArea.appendChild(btn);
                });
            }
            startTimer(customTime);
        }

        function handleMultipleChoiceClick(btn, value) {
            if(currentSelections.includes(value)) {
                currentSelections = currentSelections.filter(v => v !== value);
                btn.classList.remove('selected');
            } else {
                currentSelections.push(value);
                btn.classList.add('selected');
            }
        }

        function handleSequenceClick(btn, value) {
            if(!currentSelections.includes(value)) {
                currentSelections.push(value);
                btn.classList.add('selected');
                const badge = document.createElement('div');
                badge.className = 'seq-badge';
                badge.innerText = currentSelections.length;
                btn.appendChild(badge);
            }
        }

        function redoSelection() {
            currentSelections = [];
            document.getElementById('text-answer') && (document.getElementById('text-answer').value = "");
            document.querySelectorAll('.ans-btn').forEach(btn => {
                btn.classList.remove('selected');
                const badge = btn.querySelector('.seq-badge');
                if(badge) badge.remove();
            });
        }

        function toggleFastPass() {
            if(!hasFastPassRemaining) return;
            isFastPassActive = !isFastPassActive;
            const btn = document.getElementById('fastpass-btn');
            if(isFastPassActive) {
                btn.classList.add('bg-yellow-400', 'text-black');
                btn.classList.remove('bg-purple-600', 'text-white');
            } else {
                btn.classList.add('bg-purple-600', 'text-white');
                btn.classList.remove('bg-yellow-400', 'text-black');
            }
        }

        function submitAnswer() {
            let finalAnswer = "";
            const qType = currentQuestion['Question type'].toLowerCase();

            if (qType.includes('text') || qType.includes('math')) {
                finalAnswer = document.getElementById('text-answer').value.trim();
            } else {
                finalAnswer = currentSelections.join(","); 
            }

            if(finalAnswer === "" && currentSelections.length === 0) return;

            if(isFastPassActive) {
                hasFastPassRemaining = false;
                document.getElementById('fastpass-btn').classList.add('hidden');
            }

            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "submit_answer", answer: finalAnswer, used_gamble: isFastPassActive }));
            }
            document.getElementById('submitted-overlay').classList.remove('hidden');
        }

        function lockScreen() {
            document.getElementById('controls-footer').classList.add('hidden');
            document.getElementById('submitted-overlay').classList.add('hidden');
            document.getElementById('locked-overlay').classList.remove('hidden');
        }

        function highlightAnswers(correctStr) {
            document.getElementById('locked-overlay').classList.add('hidden');
            document.getElementById('submitted-overlay').classList.add('hidden');
            document.getElementById('controls-footer').classList.add('hidden');
            
            const qType = currentQuestion['Question type'].toLowerCase();

            if (qType.includes('text') || qType.includes('math')) {
                const input = document.getElementById('text-answer');
                input.disabled = true;
                input.value = `Answer: ${correctStr}`;
                input.classList.add('text-correct-reveal', 'bg-green-900/30');
                return;
            }

            const requiredLetters = correctStr.includes('&') ? correctStr.split('&') : correctStr.split('');
            
            document.querySelectorAll('.ans-btn').forEach(btn => {
                const letter = btn.dataset.letter;
                if (requiredLetters.includes(letter)) {
                    btn.classList.add('correct-reveal');
                } else if (btn.classList.contains('selected')) {
                    btn.classList.add('wrong-reveal');
                } else {
                    btn.style.opacity = '0.3';
                }
            });
        }

        function startTimer(seconds) {
            const bar = document.getElementById('progress-bar');
            bar.style.transition = 'none';
            bar.style.width = '100%';
            void bar.offsetWidth; 
            bar.style.transition = `width ${seconds}s linear`;
            bar.style.width = '0%';
        }
    </script>
</body>
</html>
