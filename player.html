<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAYER APP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; text-align: center; }
        
        /* TIMER BAR (TOP) */
        #timer-container { width: 100%; height: 15px; background: #1e293b; position: fixed; top: 0; left: 0; }
        #timer-bar { width: 100%; height: 100%; background: #22c55e; transition: none; }

        .screen { display: none; padding: 30px; flex-direction: column; justify-content: center; height: 100%; }
        .screen.active { display: flex; }

        /* JOIN SCREEN */
        .join-box { background: #1e293b; padding: 40px; border-radius: 35px; border: 3px solid #6366f1; }
        input { width: 100%; padding: 20px; margin: 15px 0; border-radius: 15px; background: #0f172a; color: white; border: none; font-size: 1.3rem; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
        .color-dot { height: 60px; border-radius: 15px; cursor: pointer; border: 4px solid transparent; }
        .color-dot.selected { border-color: white; transform: scale(1.1); box-shadow: 0 0 20px white; }

        /* QUIZ SCREEN */
        #q-title { font-size: 2rem; font-weight: 800; margin-bottom: 40px; }
        .choices-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .btn-choice { 
            padding: 24px; border-radius: 20px; border: 4px solid #334155; 
            font-size: 1.5rem; font-weight: 800; color: white; transition: 0.2s; 
            text-align: left; display: flex; align-items: center; gap: 20px;
        }
        .letter-box { background: white; color: black; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 1.3rem; }
        
        /* COLORS FROM VISION */
        .btn-A { background: #ef4444; } .btn-B { background: #3b82f6; } .btn-C { background: #10b981; } 
        .btn-D { background: #f59e0b; } .btn-E { background: #8b5cf6; } .btn-F { background: #ec4899; }
        .btn-choice:disabled { opacity: 0.4; }
        #break-screen { background: #8b5cf6; }
    </style>
</head>
<body>
    <div id="timer-container"><div id="timer-bar"></div></div>

    <div id="join-screen" class="screen active">
        <div class="join-box">
            <h1 style="font-weight: 800;">JOIN THE GAME</h1>
            <input type="text" id="join-code" placeholder="Enter Room Code">
            <input type="text" id="join-name" placeholder="Enter Your Name">
            <div class="color-grid">
                <div class="color-dot" style="background:#ef4444" onclick="selCol('#ef4444', this)"></div>
                <div class="color-dot" style="background:#3b82f6" onclick="selCol('#3b82f6', this)"></div>
                <div class="color-dot" style="background:#10b981" onclick="selCol('#10b981', this)"></div>
                <div class="color-dot" style="background:#f59e0b" onclick="selCol('#f59e0b', this)"></div>
            </div>
            <button onclick="join()" class="btn-choice btn-B" style="justify-content:center;">CONNECT</button>
        </div>
    </div>

    <div id="waiting" class="screen"><h1>CONNECTED</h1><p>Wait for the next question...</p></div>
    <div id="break-screen" class="screen"><h1>INTERMISSION</h1><p>The host has paused the game.</p></div>

    <div id="quiz-screen" class="screen">
        <h2 id="q-title">Question Title</h2>
        <div id="choices-container" class="choices-grid"></div>
    </div>

    <div id="text-screen" class="screen">
        <h2>TYPE YOUR ANSWER</h2>
        <input type="text" id="t-ans">
        <button onclick="submitText()" class="btn-choice btn-C" style="justify-content:center;">SUBMIT</button>
    </div>

    <script>
        let ws, room, user, color = "#6366f1", hasAns = false;
        
        function selCol(c, el) { 
            color = c; 
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
        }

        function join() {
            room = document.getElementById('join-code').value;
            user = document.getElementById('join-name').value;
            if(!room || !user) return alert("Fill everything!");
            localStorage.setItem('quiz_user', user);
            connect();
        }

        function connect() {
            ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/player/${user}`);
            ws.onopen = () => show('waiting');
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if(msg.type === "PREP") setupQ(msg.payload);
                if(msg.type === "START") startTimer(msg.payload.limit);
                if(msg.type === "STOP") lock();
                if(msg.type === "BREAK") show('break-screen');
            };
        }

        function setupQ(q) {
            hasAns = false;
            document.getElementById('timer-bar').style.transition = 'none';
            document.getElementById('timer-bar').style.width = '100%';
            show(q.type === 'text' ? 'text-screen' : 'quiz-screen');
            document.getElementById('q-title').innerText = q.title;
            const c = document.getElementById('choices-container'); c.innerHTML = "";
            q.choices.forEach((choice, i) => {
                const char = String.fromCharCode(65 + i);
                const b = document.createElement('button');
                b.className = `btn-choice btn-${char}`;
                b.innerHTML = `<div class="letter-box">${char}</div> <span>${choice}</span>`;
                b.onclick = () => { if(!hasAns) submit(char, b); };
                c.appendChild(b);
            });
        }

        function startTimer(sec) {
            const b = document.getElementById('timer-bar');
            b.style.transition = `width ${sec}s linear`;
            setTimeout(() => { b.style.width = '0%'; }, 100);
        }

        function submit(ans, btn) {
            if(hasAns) return; hasAns = true;
            ws.send(JSON.stringify({type:"ANSWER", payload:{answer: ans}}));
            lock(); btn.style.border = "6px solid white";
        }

        function submitText() {
            if(hasAns) return; hasAns = true;
            ws.send(JSON.stringify({type:"ANSWER", payload:{answer: document.getElementById('t-ans').value}}));
            lock();
        }

        function lock() { document.querySelectorAll('.btn-choice').forEach(b => b.disabled = true); }
        function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
