<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tab-active { background-color: #1e293b; border-bottom: 2px solid #3b82f6; color: #60a5fa; }
        .hidden { display: none !important; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        /* Modal background */
        .modal-bg { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="flex-1 flex items-center justify-center">
        <div class="glass-panel p-8 rounded-xl w-96 shadow-2xl">
            <h1 class="text-3xl font-bold mb-6 text-center text-blue-400">Master Login</h1>
            <input type="text" id="host-user" placeholder="Host Username" class="w-full p-3 mb-4 rounded bg-slate-800 border border-slate-600 outline-none focus:border-blue-500">
            <input type="password" id="host-pass" placeholder="Password" class="w-full p-3 mb-6 rounded bg-slate-800 border border-slate-600 outline-none focus:border-blue-500">
            <button onclick="loginMaster()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded transition-colors">Login & Create Room</button>
        </div>
    </div>

    <div id="custom-q-modal" class="hidden fixed inset-0 z-50 modal-bg flex items-center justify-center">
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-600 w-full max-w-lg">
            <h2 class="text-2xl font-bold mb-4 text-blue-400">Create Question On The Fly</h2>
            
            <select id="custom-type" class="w-full p-2 mb-3 bg-slate-900 border border-slate-700 rounded text-white">
                <option value="text">Text / Short Answer</option>
                <option value="math">Number / Math</option>
                <option value="Multiple Choice">Multiple Choice</option>
                <option value="Sequence">Sequence</option>
            </select>
            
            <textarea id="custom-q" placeholder="Type your question here..." class="w-full p-2 mb-3 bg-slate-900 border border-slate-700 rounded text-white h-24"></textarea>
            <input type="text" id="custom-ans" placeholder="Correct Answer (e.g., A, A&B, or text)" class="w-full p-2 mb-3 bg-slate-900 border border-slate-700 rounded text-white">
            
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input type="text" id="custom-optA" placeholder="Option A (Optional)" class="p-2 bg-slate-900 border border-slate-700 rounded text-white">
                <input type="text" id="custom-optB" placeholder="Option B (Optional)" class="p-2 bg-slate-900 border border-slate-700 rounded text-white">
                <input type="text" id="custom-optC" placeholder="Option C (Optional)" class="p-2 bg-slate-900 border border-slate-700 rounded text-white">
                <input type="text" id="custom-optD" placeholder="Option D (Optional)" class="p-2 bg-slate-900 border border-slate-700 rounded text-white">
            </div>

            <div class="flex justify-end space-x-3">
                <button onclick="closeCustomModal()" class="px-4 py-2 bg-slate-600 rounded hover:bg-slate-500">Cancel</button>
                <button onclick="insertCustomQuestion()" class="px-4 py-2 bg-blue-600 font-bold rounded hover:bg-blue-500">Insert as Next Question</button>
            </div>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden h-full flex flex-col">
        <header class="glass-panel p-4 flex justify-between items-center shadow-md z-10">
            <div class="flex items-center space-x-6">
                <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">PUB QUIZ PRO</h1>
                <div class="bg-slate-800 px-4 py-1 rounded-full border border-slate-600">
                    <span class="text-slate-400 text-sm uppercase">Room:</span>
                    <span id="room-code-display" class="ml-2 font-mono text-xl font-bold text-yellow-400">----</span>
                </div>
            </div>
            <div class="flex space-x-4 items-center">
                <button onclick="openCustomModal()" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded font-bold text-sm transition text-white">+ On The Fly</button>
                <button onclick="toggleBreak()" id="break-btn" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded font-semibold text-sm transition">Start Break</button>
                <button onclick="declareWinner()" class="bg-yellow-600 hover:bg-yellow-500 px-4 py-2 rounded font-semibold text-sm transition text-white">Declare Winner</button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-80 glass-panel border-r border-slate-700 flex flex-col">
                <div class="flex border-b border-slate-700 bg-slate-800">
                    <button onclick="switchTab('teams')" id="tab-teams" class="flex-1 py-3 text-sm font-bold tab-active">Live Status</button>
                    <button onclick="switchTab('stats')" id="tab-stats" class="flex-1 py-3 text-sm font-bold text-slate-400">Statistics</button>
                    <button onclick="switchTab('settings')" id="tab-settings" class="flex-1 py-3 text-sm font-bold text-slate-400">Settings</button>
                </div>
                
                <div id="content-teams" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
                <div id="content-stats" class="hidden flex-1 overflow-y-auto p-4 space-y-4"></div>
                
                <div id="content-settings" class="hidden flex-1 overflow-y-auto p-4 space-y-6">
                    <div class="bg-slate-800 p-4 rounded border border-slate-600">
                        <h3 class="text-blue-400 font-bold mb-3 border-b border-slate-600 pb-2">Scoring Rules</h3>
                        <label class="flex items-center space-x-3 mb-4 cursor-pointer">
                            <input type="checkbox" id="auto-end-toggle" checked class="w-5 h-5"> 
                            <span class="text-sm font-semibold text-slate-200">Auto-End when all answer</span>
                        </label>
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-sm font-semibold text-slate-300">Fast Pass Multiplier:</span> 
                            <input type="number" id="fast-pass-mult" value="5" class="w-16 bg-slate-900 border border-slate-600 p-1 rounded text-center text-white">
                        </div>
                    </div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col relative">
                <div id="csv-overlay" class="absolute inset-0 bg-slate-900/90 z-20 flex flex-col items-center justify-center">
                    <h2 class="text-2xl font-bold mb-4">Upload Question Pack</h2>
                    <input type="file" id="csv-upload" accept=".csv" class="mb-4 block text-sm text-slate-400 file:py-3 file:px-6 file:rounded-full file:bg-blue-600 file:text-white cursor-pointer">
                </div>

                <div class="flex-1 p-8 overflow-y-auto flex flex-col items-center justify-center">
                    <div id="current-question-container" class="w-full max-w-4xl text-center hidden">
                        <h2 id="cq-text" class="text-4xl font-black mb-6 text-white leading-tight"></h2>
                        <div id="cq-media-controls" class="mb-6 hidden">
                            <a id="ext-media-link" href="#" target="_blank" class="inline-block bg-blue-600 px-6 py-3 rounded-xl font-bold text-lg shadow-lg hover:bg-blue-500 transition">▶ Open Media Link</a>
                        </div>
                        <div id="cq-options" class="grid grid-cols-2 gap-4 mb-8"></div>
                        
                        <div class="glass-panel inline-block px-8 py-4 rounded-xl border border-slate-600">
                            <span class="text-slate-400 block mb-1 text-sm">Correct Answer</span>
                            <span id="cq-answer" class="text-3xl font-bold text-green-400"></span>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-6 border-t border-slate-700 flex justify-between items-center">
                    <div class="flex space-x-4">
                        <button onclick="revealAnswers()" id="btn-reveal" class="hidden bg-purple-600 hover:bg-purple-500 px-6 py-3 rounded-xl font-bold shadow text-white transition">Reveal Answers & Play Sound</button>
                    </div>
                    <div class="flex items-center space-x-6">
                        <div class="text-center">
                            <div id="timer-display" class="text-4xl font-mono font-bold text-white">00:00</div>
                        </div>
                        <button onclick="stopTimerAndLock()" class="bg-red-600 hover:bg-red-500 px-6 py-2 rounded font-bold transition">End Question Now</button>
                    </div>
                </div>
            </main>
        </div>

        <footer class="h-auto min-h-[8rem] glass-panel border-t border-slate-700 flex flex-wrap">
            <div class="flex-1 p-4 flex flex-col justify-center border-r border-slate-700 min-w-[500px]">
                <span class="text-xs text-slate-400 uppercase font-bold mb-2 tracking-widest">Next Question Preview</span>
                <p id="nq-text" class="text-lg font-semibold text-slate-300 truncate mb-3">Please load your CSV to begin...</p>
                <div class="flex flex-wrap gap-4 text-sm items-center">
                    <label class="flex items-center space-x-2"><span class="text-slate-400">Time:</span> <input type="number" id="mod-time" value="30" class="w-14 bg-slate-800 border border-slate-600 rounded px-2 py-1 text-white"></label>
                    <label class="flex items-center space-x-2"><span class="text-slate-400">Pts:</span> <input type="number" id="mod-points" value="10" onchange="syncPenalty()" class="w-14 bg-slate-800 border border-slate-600 rounded px-2 py-1 text-white"></label>
                    <label class="flex items-center space-x-2"><span class="text-red-400">Pen:</span> <input type="number" id="mod-penalty" value="10" class="w-14 bg-slate-800 border border-slate-600 rounded px-2 py-1 text-white"></label>
                    <label class="flex items-center space-x-2"><span class="text-green-400">Fast Bonus:</span> <input type="number" id="fastest-bonus-pts" value="5" class="w-14 bg-slate-800 border border-slate-600 rounded px-2 py-1 text-white"></label>
                    
                    <label class="flex items-center space-x-1 text-slate-300 cursor-pointer ml-2"><input type="checkbox" id="mod-fastpass" checked class="w-4 h-4"> <span>Fast Pass</span></label>
                    <label class="flex items-center space-x-1 text-slate-300 cursor-pointer"><input type="checkbox" id="mod-seepic" checked class="w-4 h-4"> <span>Re-view Pic</span></label>
                    
                    <button onclick="sendNextQuestion()" class="ml-auto bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded font-bold text-white shadow-lg transition">SEND QUESTION</button>
                </div>
            </div>
            <div class="w-48 p-4 flex flex-col justify-center">
                <span class="text-sm font-semibold text-slate-300 mb-2">Master Volume</span>
                <input type="range" id="vol-master" min="0" max="100" value="100" class="w-full cursor-pointer">
            </div>
        </footer>
    </div>

    <script>
        const BACKEND_URL = 'https://my-pub-quiz.onrender.com'; 
        const WS_URL = 'wss://my-pub-quiz.onrender.com/ws/master/';
        
        const buzzerSounds = {
            'sound1': new Audio('./sounds/buzzer1.mp3'),
            'sound2': new Audio('./sounds/buzzer2.mp3'),
            'sound3': new Audio('./sounds/buzzer3.mp3'),
            'sound4': new Audio('./sounds/buzzer4.mp3'),
            'sound5': new Audio('./sounds/buzzer5.mp3'),
            'sound6': new Audio('./sounds/buzzer6.mp3'),
            'sound7': new Audio('./sounds/buzzer7.mp3'),
            'sound8': new Audio('./sounds/buzzer8.mp3'),
            'sound9': new Audio('./sounds/buzzer9.mp3'),
            'sound10': new Audio('./sounds/buzzer10.mp3'),
            'sound11': new Audio('./sounds/buzzer11.mp3'),
            'sound12': new Audio('./sounds/buzzer12.mp3'),
            'sound13': new Audio('./sounds/buzzer13.mp3'),
            'sound14': new Audio('./sounds/buzzer14.mp3'),
            'sound15': new Audio('./sounds/buzzer15.mp3'),
            'sound16': new Audio('./sounds/buzzer16.mp3'),
            'sound17': new Audio('./sounds/buzzer17.mp3'),
            'sound18': new Audio('./sounds/buzzer18.mp3'),
            'sound19': new Audio('./sounds/buzzer19.mp3'),
            'sound20': new Audio('./sounds/buzzer20.mp3')
        };
        
        let ws;
        let roomCode = "";
        let questions = [];
        let currentQuestionIndex = -1;
        let teamData = {}; 
        let timerInterval;
        let timeLeft = 0;
        let questionActive = false;
        let fastestCorrectTeam = null; // Store for reveal sound

        document.getElementById('csv-upload').addEventListener('change', (e) => {
            Papa.parse(e.target.files[0], { header: true, skipEmptyLines: true, complete: (res) => {
                questions = res.data;
                document.getElementById('csv-overlay').classList.add('hidden');
                prepareNextQuestion();
            }});
        });

        function syncPenalty() {
            document.getElementById('mod-penalty').value = document.getElementById('mod-points').value;
        }

        async function loginMaster() {
            const user = document.getElementById('host-user').value;
            const pass = document.getElementById('host-pass').value;

            try {
                const res = await fetch(`${BACKEND_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (res.ok) {
                    roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard-screen').classList.remove('hidden');
                    document.getElementById('room-code-display').innerText = roomCode;
                    connectWebSocket(roomCode);
                } else {
                    alert("Invalid Credentials");
                }
            } catch (err) {
                alert("Server is waking up. Please wait 20 seconds and try again.");
            }
        }

        function connectWebSocket(code) {
            ws = new WebSocket(`${WS_URL}${code}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === "player_joined") {
                    if(!teamData[data.team_name]) {
                        teamData[data.team_name] = { score: 0, streak: 0, maxStreak: 0, wrongStreak: 0, fastAnswers: 0, hasFastPass: true, answeredCurrent: false, currentAnswerStatus: null };
                    }
                    updateSidebars();
                } else if (data.type === "buzzer_selected") {
                    if(teamData[data.team_name]) teamData[data.team_name].buzzer = data.selection;
                } else if (data.type === "answer_submitted" && questionActive) {
                    processAnswer(data);
                }
            };
        }

        function openCustomModal() { document.getElementById('custom-q-modal').classList.remove('hidden'); }
        function closeCustomModal() { document.getElementById('custom-q-modal').classList.add('hidden'); }
        
        function insertCustomQuestion() {
            const newQ = {
                'Question type': document.getElementById('custom-type').value,
                'Question number': currentQuestionIndex + 2 + " (Custom)",
                'Question': document.getElementById('custom-q').value,
                'Correct answer': document.getElementById('custom-ans').value,
                'Points': 10,
                'Answer A': document.getElementById('custom-optA').value,
                'Answer B': document.getElementById('custom-optB').value,
                'Answer C': document.getElementById('custom-optC').value,
                'Answer D': document.getElementById('custom-optD').value
            };
            questions.splice(currentQuestionIndex + 1, 0, newQ);
            closeCustomModal();
            prepareNextQuestion();
            alert("Custom question added and ready to send!");
        }

        function prepareNextQuestion() {
            if (currentQuestionIndex + 1 < questions.length) {
                const nq = questions[currentQuestionIndex + 1];
                document.getElementById('nq-text').innerText = `${nq['Question number']}. ${nq['Question']}`;
                document.getElementById('mod-points').value = nq['Points'] || 10;
                document.getElementById('mod-penalty').value = nq['Points'] || 10;
            } else {
                document.getElementById('nq-text').innerText = "END OF QUIZ";
            }
        }

        function sendNextQuestion() {
            if (currentQuestionIndex + 1 >= questions.length) return;
            currentQuestionIndex++;
            const q = questions[currentQuestionIndex];
            
            questionActive = true;
            fastestCorrectTeam = null; 
            document.getElementById('btn-reveal').classList.add('hidden');

            let masterAnswerText = q['Correct answer'];
            const optsNames = ['Answer A', 'Answer B', 'Answer C', 'Answer D', 'Answer E', 'Answer F'];
            const qType = q['Question type'].toLowerCase();

            // Format Sequence or Multiple Choice for Master Display
            if (qType.includes('sequence')) {
                let seqText = [];
                masterAnswerText.split('').forEach(letter => {
                    const idx = letter.charCodeAt(0) - 65;
                    if(q[optsNames[idx]]) seqText.push(q[optsNames[idx]]);
                });
                masterAnswerText = seqText.join(" ➔ ");
            } else if(masterAnswerText.includes('&')) {
                let textParts = [];
                masterAnswerText.split('&').forEach(letter => {
                    const idx = letter.charCodeAt(0) - 65;
                    if(q[optsNames[idx]]) textParts.push(q[optsNames[idx]]);
                });
                masterAnswerText = textParts.join(" AND ");
            } else if (masterAnswerText.length === 1 && masterAnswerText >= 'A' && masterAnswerText <= 'F') {
                const idx = masterAnswerText.charCodeAt(0) - 65;
                if(q[optsNames[idx]]) masterAnswerText = q[optsNames[idx]];
            }

            document.getElementById('current-question-container').classList.remove('hidden');
            document.getElementById('cq-text').innerText = q['Question'];
            document.getElementById('cq-answer').innerText = masterAnswerText;

            // Link based Media (Point 11)
            const mediaControls = document.getElementById('cq-media-controls');
            const mediaLink = document.getElementById('ext-media-link');
            if (q['Media LINK'] && !q['Media LINK'].match(/\.(jpeg|jpg|gif|png)$/)) {
                mediaLink.href = q['Media LINK'];
                mediaControls.classList.remove('hidden');
            } else {
                mediaControls.classList.add('hidden');
            }

            for(let team in teamData) {
                teamData[team].answeredCurrent = false;
                teamData[team].currentAnswerStatus = null;
            }
            updateSidebars();

            const payload = {
                action: "send_question",
                question_data: q,
                timer: parseInt(document.getElementById('mod-time').value),
                allow_fastpass: document.getElementById('mod-fastpass').checked,
                allow_seepic: document.getElementById('mod-seepic').checked
            };
            ws.send(JSON.stringify(payload));

            timeLeft = payload.timer;
            startTimer();
            prepareNextQuestion();
        }

        function processAnswer(data) {
            const { team_name, answer, is_first, used_gamble } = data;
            if(!teamData[team_name] || !questionActive) return;

            const q = questions[currentQuestionIndex];
            const tData = teamData[team_name];
            const qType = q['Question type'].toLowerCase();
            tData.answeredCurrent = true;

            let appliedMultiplier = 1;
            if (used_gamble && tData.hasFastPass) {
                tData.hasFastPass = false; 
                if (is_first) appliedMultiplier = parseInt(document.getElementById('fast-pass-mult').value);
            }

            const correctRaw = q['Correct answer'].toString().toUpperCase();
            const playerAns = answer.toString().toUpperCase();
            let isCorrect = false;

            // Strict Grading Logic
            if (qType.includes('sequence')) {
                const req = correctRaw.replace(/,/g, '');
                const got = playerAns.replace(/,/g, '');
                isCorrect = (req === got); // MUST BE EXACT ORDER
            } else if (qType.includes('text')) {
                // First letter match check
                isCorrect = (playerAns === correctRaw || playerAns.charAt(0) === correctRaw.charAt(0));
            } else if (correctRaw.includes('&')) {
                const req = correctRaw.split('&').sort().join(',');
                const got = playerAns.split(',').sort().join(',');
                isCorrect = (req === got);
            } else {
                isCorrect = (playerAns === correctRaw || playerAns === correctRaw.charAt(0));
            }

            tData.currentAnswerStatus = isCorrect;
            const basePts = parseInt(document.getElementById('mod-points').value);
            const penaltyAmt = parseInt(document.getElementById('mod-penalty').value) || 0;
            
            if (isCorrect) {
                tData.streak++;
                tData.wrongStreak = 0;
                if(tData.streak > tData.maxStreak) tData.maxStreak = tData.streak;
                
                let ptsAwarded = basePts * appliedMultiplier;
                if (is_first) {
                    tData.fastAnswers++;
                    ptsAwarded += parseInt(document.getElementById('fastest-bonus-pts').value);
                    fastestCorrectTeam = team_name; // Store to play sound later
                }
                tData.score += ptsAwarded;
            } else {
                tData.streak = 0;
                tData.wrongStreak++;
                tData.score -= penaltyAmt;
            }

            updateSidebars();
            const rawScores = extractScores();
            ws.send(JSON.stringify({ action: "update_scores", scores: rawScores }));

            if(document.getElementById('auto-end-toggle').checked) {
                const allDone = Object.values(teamData).every(t => t.answeredCurrent);
                if(allDone) stopTimerAndLock();
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) stopTimerAndLock();
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timer-display').innerText = timeLeft > 0 ? `00:${timeLeft.toString().padStart(2, '0')}` : "00:00";
        }

        function stopTimerAndLock() {
            clearInterval(timerInterval);
            questionActive = false;
            ws.send(JSON.stringify({ action: "end_question" })); 
            document.getElementById('btn-reveal').classList.remove('hidden');
        }

        function revealAnswers() {
            const q = questions[currentQuestionIndex];
            ws.send(JSON.stringify({ action: "reveal_answer", correct: q['Correct answer'] }));
            
            // Play delayed sound
            if (fastestCorrectTeam && teamData[fastestCorrectTeam].buzzer) {
                const soundKey = teamData[fastestCorrectTeam].buzzer.sound;
                if(buzzerSounds[soundKey]) {
                    buzzerSounds[soundKey].volume = document.getElementById('vol-master').value / 100;
                    buzzerSounds[soundKey].play().catch(e => console.log("Audio play error"));
                }
            }
        }

        function toggleBreak() {
            switchTab('stats');
            ws.send(JSON.stringify({ action: "trigger_break", leaderboard: extractScores() }));
        }

        function declareWinner() {
            if(confirm("Confirm: End Quiz?")) {
                const sorted = Object.entries(extractScores()).sort((a,b) => b[1]-a[1]);
                const winner = sorted[0] ? sorted[0][0] : "None";
                ws.send(JSON.stringify({ action: "declare_winner", winner: winner }));
                alert("Winner: " + winner);
            }
        }

        function extractScores() {
            let s = {};
            for(let k in teamData) s[k] = teamData[k].score;
            return s;
        }

        function switchTab(tab) {
            document.getElementById('tab-teams').className = tab === 'teams' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-slate-400';
            document.getElementById('tab-stats').className = tab === 'stats' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-slate-400';
            document.getElementById('tab-settings').className = tab === 'settings' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-slate-400';
            
            document.getElementById('content-teams').classList.toggle('hidden', tab !== 'teams');
            document.getElementById('content-stats').classList.toggle('hidden', tab !== 'stats');
            document.getElementById('content-settings').classList.toggle('hidden', tab !== 'settings');
        }

        function updateSidebars() {
            const tCont = document.getElementById('content-teams');
            const sCont = document.getElementById('content-stats');
            tCont.innerHTML = ""; sCont.innerHTML = "";

            Object.keys(teamData).forEach(team => {
                const d = teamData[team];
                let icon = d.answeredCurrent ? (d.currentAnswerStatus ? '✅' : '❌') : '⏳';
                
                tCont.innerHTML += `<div class="bg-slate-800 p-3 rounded flex justify-between">
                    <span>${team} ${d.hasFastPass ? '🎫' : ''}</span><span>${icon}</span></div>`;

                sCont.innerHTML += `<div class="bg-slate-800 p-3 rounded text-sm text-slate-300">
                    <div class="font-bold text-blue-400 mb-1">${team} - ${d.score}</div>
                    <div class="grid grid-cols-2 gap-1">
                        <div>Streak: ${d.maxStreak}</div><div>Cold: ${d.wrongStreak}</div>
                        <div>Fast: ${d.fastAnswers}</div><div>Pass: ${d.hasFastPass ? 'Yes' : 'No'}</div>
                    </div></div>`;
            });
        }
    </script>
</body>
</html>
