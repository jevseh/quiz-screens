<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QUIZ MASTER | ULTIMATE DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; --danger: #ef4444; --warning: #f59e0b; --break: #a855f7; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 340px; background: var(--card); border-right: 4px solid #334155; display: flex; flex-direction: column; padding: 30px; }
        .room-info { text-align: center; margin-bottom: 30px; padding: 20px; background: rgba(0,0,0,0.4); border-radius: 20px; border: 2px solid var(--primary); }
        #r-code { margin: 10px 0 0; color: var(--primary); font-size: 3.2rem; letter-spacing: 5px; font-weight: 800; }
        
        .tab-btn { background: #334155; border: none; color: white; padding: 18px; margin: 8px 0; border-radius: 12px; cursor: pointer; text-align: left; font-weight: 600; display: flex; align-items: center; gap: 12px; font-size: 1.1rem; }
        .tab-btn.active { background: var(--primary); border-left: 6px solid white; box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4); }

        #main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #1e1b4b, var(--bg)); }
        .view { display: none; max-width: 1000px; margin: 0 auto; }
        .view.active { display: block; }
        
        .card { background: var(--card); padding: 40px; border-radius: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); border: 1px solid #334155; margin-bottom: 30px; }
        .q-header { display: flex; justify-content: space-between; align-items: center; }
        #timer-box { background: #000; color: var(--warning); padding: 15px 35px; border-radius: 15px; font-weight: 900; font-size: 2.5rem; border: 4px solid var(--warning); }
        
        /* 5 BUTTON GRID */
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-huge { padding: 30px; border-radius: 20px; border: none; cursor: pointer; font-weight: 800; font-size: 1.3rem; text-transform: uppercase; transition: 0.2s; }
        .btn-next { background: var(--warning); color: #000; }
        .btn-start { background: var(--accent); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-break { background: var(--break); color: white; }
        .btn-end { background: #0f172a; color: var(--danger); grid-column: span 2; border: 3px solid var(--danger); margin-top: 10px; }
        .btn-huge:hover { transform: translateY(-5px); filter: brightness(1.2); }

        #media-frame { width: 100%; max-height: 350px; border-radius: 20px; overflow: hidden; margin: 20px 0; display: none; border: 4px solid #334155; }
        .list-item { background: rgba(0,0,0,0.3); padding: 15px 25px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>
    <audio id="audio-engine"></audio>

    <div id="login-gate" style="position:fixed; inset:0; background:var(--bg); z-index:1000; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--card); padding:50px; border-radius:30px; text-align:center; width:400px;">
            <h1>ADMIN LOGIN</h1>
            <input type="text" id="usr" placeholder="Username" style="width:100%; padding:15px; margin:10px 0; border-radius:10px; background:#0f172a; color:white; border:none;">
            <input type="password" id="pwd" placeholder="Password" style="width:100%; padding:15px; margin:10px 0; border-radius:10px; background:#0f172a; color:white; border:none;">
            <button onclick="login()" class="btn-huge btn-start" style="width:100%;">LOGIN</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="room-info"><div>ROOM CODE</div><h2 id="r-code">----</h2></div>
        <button class="tab-btn active" onclick="showTab('q-view', this)">🎮 Control Panel</button>
        <button class="tab-btn" onclick="showTab('f-view', this)">⚡ Activity Feed</button>
        <button class="tab-btn" onclick="showTab('l-view', this)">🏆 Leaderboard</button>
        <button class="tab-btn" onclick="showTab('s-view', this)">⚙️ Settings</button>
        <div style="margin-top:auto;">
            <input type="file" id="csv" style="display:none" accept=".csv">
            <button onclick="document.getElementById('csv').click()" class="tab-btn" style="background:#475569; justify-content:center;">📁 LOAD CSV</button>
        </div>
    </div>

    <div id="main">
        <div id="q-view" class="view active">
            <div class="card">
                <div class="q-header"><span id="q-meta">System Ready</span><div id="timer-box">00s</div></div>
                <h1 id="q-text">Upload your CSV to begin.</h1>
                <div id="media-frame"><img id="media-preview" style="width:100%; height:100%; object-fit:contain;"></div>
                <div id="choices-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
            </div>
            <div class="control-grid">
                <button class="btn-huge btn-next" onclick="send('PREP')">Next Question</button>
                <button class="btn-huge btn-start" onclick="send('START')">Start Question</button>
                <button class="btn-huge btn-stop" onclick="send('STOP')">Stop Timer</button>
                <button class="btn-huge btn-break" onclick="send('BREAK')">Break Mode</button>
                <button class="btn-huge btn-end" onclick="confirmReset()">End & Reset</button>
            </div>
        </div>
        <div id="f-view" class="view"><h1>Feed</h1><div id="feed"></div></div>
        <div id="l-view" class="view"><h1>Standings</h1><div id="leaderboard"></div></div>
        <div id="s-view" class="view"><h1>Timer Settings</h1><input type="number" id="s-time" value="20" style="padding:15px; background:#0f172a; color:white; border:none; font-size:1.5rem;"></div>
    </div>

    <script>
        let ws, room = "", qIdx = -1, quizData = [];
        const audio = document.getElementById('audio-engine');

        async function login() {
            const res = await fetch('https://my-pub-quiz.onrender.com/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: document.getElementById('usr').value, password: document.getElementById('pwd').value}) });
            const data = await res.json();
            if(data.success) { room = data.room_code; localStorage.setItem('quiz_room', room); location.reload(); }
        }

        window.onload = () => { if(localStorage.getItem('quiz_room')) { room = localStorage.getItem('quiz_room'); document.getElementById('login-gate').style.display = 'none'; document.getElementById('r-code').innerText = room; connectWS(); } };

        function connectWS() {
            ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/master/M`);
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if(msg.type === "FEED") updateFeed(msg.payload);
                if(msg.type === "SCORES") updateLeaderboard(msg.payload);
            };
        }

        function send(type) {
            if(type === 'PREP') { qIdx++; audio.pause(); audio.src = ""; }
            const q = quizData[qIdx];
            let payload = { idx: qIdx };
            if(type === 'PREP' && q) payload = { idx: qIdx, title: q.title, type: q.type, choices: q.choices.split('|'), med: q.med };
            if(type === 'START') {
                payload.limit = document.getElementById('s-time').value;
                if(q && q.med && q.med.includes('.mp3')) { audio.src = q.med; audio.play(); }
                let c = payload.limit;
                const t = setInterval(() => { c--; document.getElementById('timer-box').innerText = (c<0?0:c)+"s"; if(c<=0) clearInterval(t); }, 1000);
            }
            ws.send(JSON.stringify({type, payload}));
            if(type === 'PREP') updateUI();
        }

        document.getElementById('csv').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
                quizData = lines.slice(1).map(l => {
                    const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let rt = (c[1]||'multi').toLowerCase();
                    return { title: c[2].replace(/"/g,""), type: rt.includes('seq')?'sequence':(rt.includes('multi')?'multi':'text'), correct: c[3].replace(/"/g,""), pts: c[4]||10, med: c[6]?c[6].trim():"", choices: [c[7],c[8],c[9],c[10],c[11],c[12]].filter(x=>x).join('|').replace(/"/g,"") };
                });
                alert("Loaded " + quizData.length + " questions!");
                updateUI();
            };
            r.readAsText(e.target.files[0]);
        };

        function updateUI() {
            const q = quizData[qIdx];
            if(!q) return;
            document.getElementById('q-meta').innerText = `Q: ${qIdx+1}/${quizData.length}`;
            document.getElementById('q-text').innerText = q.title;
            const mb = document.getElementById('media-frame');
            if(q.med && !q.med.includes('.mp3')) { document.getElementById('media-preview').src = q.med; mb.style.display = 'block'; } else mb.style.display = 'none';
        }

        function updateFeed(d) {
            const i = document.createElement('div'); i.className = "list-item";
            i.innerHTML = `<span><b>${d.user}</b>: ${d.msg}</span> <span>${d.pts}</span>`;
            document.getElementById('feed').prepend(i);
        }

        function updateLeaderboard(s) {
            const l = document.getElementById('leaderboard'); l.innerHTML = "";
            Object.entries(s).sort((a,b)=>b[1]-a[1]).forEach(([n, sc]) => { l.innerHTML += `<div class="list-item"><span>${n}</span><span>${sc}</span></div>`; });
        }

        function showTab(id, btn) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); btn.classList.add('active'); }
        function confirmReset() { if(confirm("End Quiz?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
