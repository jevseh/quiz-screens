<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ MASTER PRO | CONTROL CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; 
            --accent: #22c55e; --danger: #ef4444; --warning: #f59e0b; --break: #a855f7;
        }
        
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR (FOLLOWING YOUR LAYOUT) */
        #sidebar { 
            width: 340px; background: var(--card); border-right: 3px solid #334155; 
            display: flex; flex-direction: column; padding: 30px; z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .room-info { 
            text-align: center; margin-bottom: 30px; padding: 25px; 
            background: rgba(0,0,0,0.4); border-radius: 20px; border: 2px solid var(--primary); 
        }

        #r-code { margin: 10px 0 0; color: var(--primary); font-size: 3.2rem; letter-spacing: 6px; font-weight: 800; line-height: 1; }

        .tab-btn { 
            background: #334155; border: none; color: white; padding: 18px; margin: 10px 0; 
            border-radius: 15px; cursor: pointer; text-align: left; font-weight: 600; 
            transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 1.1rem;
            border-left: 5px solid transparent;
        }

        .tab-btn:hover { background: #475569; border-left: 5px solid var(--primary); padding-left: 25px; }
        .tab-btn.active { background: var(--primary); box-shadow: 0 4px 25px rgba(99, 102, 241, 0.4); border-left: 5px solid white; }

        /* MAIN WORKSPACE */
        #main { flex: 1; padding: 50px; overflow-y: auto; background: radial-gradient(circle at top right, #1e1b4b, var(--bg)); position: relative; }
        .view { display: none; max-width: 1100px; margin: 0 auto; animation: slideUp 0.4s ease; }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { 
            background: var(--card); padding: 45px; border-radius: 35px; 
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.6); border: 1px solid #334155; 
            margin-bottom: 30px; 
        }

        /* TOP HEADER: META & TIMER */
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        #q-meta { color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 3px; font-size: 1.1rem; }
        #timer-box { 
            background: #000; color: var(--warning); padding: 12px 35px; 
            border-radius: 15px; font-weight: 900; font-size: 2.5rem; border: 4px solid var(--warning); 
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }

        #q-text { font-size: 2.8rem; font-weight: 800; margin: 30px 0; color: #fff; line-height: 1.2; }

        /* THE 5-BUTTON CONTROL GRID (FOLLOWING YOUR VISION) */
        .control-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin-top: 40px; }
        
        .btn-huge { 
            padding: 28px; border-radius: 20px; border: none; cursor: pointer; 
            font-weight: 800; font-size: 1.3rem; transition: 0.2s; 
            text-transform: uppercase; letter-spacing: 2px; display: flex; 
            align-items: center; justify-content: center; gap: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-next { background: var(--warning); color: #000; }
        .btn-start { background: var(--accent); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-break { background: var(--break); color: white; }
        .btn-end { background: #1e293b; color: var(--danger); grid-column: span 2; border: 3px solid var(--danger); }

        .btn-huge:hover { filter: brightness(1.2); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        .btn-huge:active { transform: scale(0.95); }

        /* MEDIA PREVIEW */
        #media-frame { 
            width: 100%; max-height: 450px; border-radius: 25px; overflow: hidden; 
            margin: 25px 0; display: none; border: 5px solid #334155; background: #000; 
        }
        #media-preview { width: 100%; height: 100%; object-fit: contain; }

        /* FEED & LIST ITEMS */
        .list-item { 
            background: rgba(0,0,0,0.3); padding: 22px 35px; border-radius: 18px; 
            margin-bottom: 15px; display: flex; justify-content: space-between; 
            align-items: center; border-left: 8px solid var(--primary); font-size: 1.3rem;
        }
        .points-val { font-weight: 900; color: var(--primary); font-size: 1.8rem; }

        /* LOGIN SCREEN */
        #login-gate { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card); padding: 70px; border-radius: 40px; text-align: center; width: 500px; border: 1px solid #334155; }
        input { width: 100%; padding: 20px; margin: 15px 0; border-radius: 15px; border: 2px solid #334155; background: #0f172a; color: white; font-size: 1.2rem; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="login-box">
            <h1 style="margin:0 0 10px; font-weight: 800; font-size: 3rem; color: var(--primary);">HOST TERMINAL</h1>
            <p style="opacity: 0.5; margin-bottom: 40px;">Please enter admin credentials to begin</p>
            <input type="text" id="usr" placeholder="Username">
            <input type="password" id="pwd" placeholder="Password">
            <button onclick="login()" class="btn-huge btn-start" style="width:100%; margin-top:20px;">Initialize Dashboard</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="room-info">
            <div style="font-size: 0.8rem; opacity: 0.6; font-weight: 800; letter-spacing: 2px;">LIVE ROOM CODE</div>
            <h2 id="r-code">----</h2>
        </div>
        
        <button class="tab-btn active" onclick="showTab('q-view', this)">🎮 Control Panel</button>
        <button class="tab-btn" onclick="showTab('f-view', this)">⚡ Activity Feed</button>
        <button class="tab-btn" onclick="showTab('l-view', this)">🏆 Leaderboard</button>
        <button class="tab-btn" onclick="showTab('s-view', this)">⚙️ Settings</button>

        <div style="margin-top: auto; border-top: 2px solid #334155; padding-top: 30px;">
            <input type="file" id="csv" style="display:none" accept=".csv">
            <button onclick="document.getElementById('csv').click()" class="tab-btn" style="width:100%; background: #475569; justify-content: center; margin-bottom: 15px;">📁 UPLOAD CSV QUIZ</button>
        </div>
    </div>

    <div id="main">
        
        <div id="q-view" class="view active">
            <div class="card">
                <div class="q-header">
                    <span id="q-meta">Waiting for CSV Data...</span>
                    <div id="timer-box">00s</div>
                </div>
                <h1 id="q-text">Upload your quiz spreadsheet to begin the session.</h1>
                
                <div id="media-frame">
                    <img id="media-preview">
                </div>

                <div id="choices-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;"></div>
            </div>

            <div class="control-grid">
                <button class="btn-huge btn-next" onclick="send('PREP')">⏭️ Next Question</button>
                <button class="btn-huge btn-start" onclick="send('START')">🏁 Start Question</button>
                <button class="btn-huge btn-stop" onclick="send('STOP')">⛔ Stop / Lock In</button>
                <button class="btn-huge btn-break" onclick="send('BREAK')">☕ Take a Break</button>
                <button class="btn-huge btn-end" onclick="confirmReset()">🛑 End Quiz / Reset Room</button>
            </div>
        </div>

        <div id="f-view" class="view">
            <h1>Live Feed</h1>
            <div id="feed"></div>
        </div>

        <div id="l-view" class="view">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 30px;">
                <h1>Tournament Standings</h1>
                <button onclick="send('RESULTS')" class="btn-huge btn-start" style="padding: 15px 40px; font-size: 1.1rem;">📢 Broadcast Final Results</button>
            </div>
            <div id="leaderboard"></div>
        </div>

        <div id="s-view" class="view">
            <h1>Engine Settings</h1>
            <div class="card">
                <h3>Timer Setup</h3>
                <p>Countdown time (seconds) for answers.</p>
                <input type="number" id="s-time" value="20" onchange="saveSettings()">
            </div>
        </div>
    </div>

    <script>
        let ws, room = "", qIdx = -1, quizData = [];

        window.onload = () => {
            if(localStorage.getItem('quiz_room')) {
                room = localStorage.getItem('quiz_room');
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('r-code').innerText = room;
                if(localStorage.getItem('s_time')) document.getElementById('s-time').value = localStorage.getItem('s_time');
                connectWS();
            }
        };

        async function login() {
            const res = await fetch('https://my-pub-quiz.onrender.com/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: document.getElementById('usr').value, password: document.getElementById('pwd').value})
            });
            const data = await res.json();
            if(data.success) {
                room = data.room_code;
                localStorage.setItem('quiz_room', room);
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('r-code').innerText = room;
                connectWS();
            } else alert("Access Denied: Invalid Credentials");
        }

        function connectWS() {
            ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/master/M`);
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if(msg.type === "FEED") updateFeed(msg.payload);
                if(msg.type === "SCORES") updateLeaderboard(msg.payload);
            };
            ws.onclose = () => setTimeout(connectWS, 2000);
        }

        // CRITICAL SYNC LOGIC: Push full question data to players so they don't get stuck!
        function send(type) {
            if(type === 'PREP') qIdx++;
            if(qIdx >= quizData.length && type === 'PREP') return alert("End of Quiz Data reached!");
            
            let payload = { idx: qIdx };
            const q = quizData[qIdx];

            if(type === 'PREP' && q) {
                payload = { 
                    idx: qIdx, 
                    title: q.title, 
                    type: q.type, 
                    choices: q.choices.split('|'),
                    med: q.med
                };
            }

            if(type === 'START') {
                payload.limit = document.getElementById('s-time').value;
                let c = payload.limit;
                const t = setInterval(() => {
                    c--; document.getElementById('timer-box').innerText = (c<0?0:c)+"s";
                    if(c<=0) clearInterval(t);
                }, 1000);
            }
            
            ws.send(JSON.stringify({type, payload}));
            if(type === 'PREP') updateUI();
        }

        document.getElementById('csv').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
                quizData = lines.slice(1).map(l => {
                    const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let rt = (c[1] || 'multi').toLowerCase();
                    let pt = rt.includes('seq') ? 'sequence' : (rt.includes('multi') ? 'multi' : 'text');
                    return {
                        title: c[2].replace(/"/g,""), type: pt, correct: c[3].replace(/"/g,""),
                        pts: c[4]||10, pen: c[5]||0, med: c[6]?c[6].trim():"",
                        choices: [c[7],c[8],c[9],c[10],c[11],c[12]].filter(x=>x).join('|').replace(/"/g,"")
                    };
                });
                ws.send(JSON.stringify({type:"LOAD", payload: quizData}));
                alert(`SUCCESS: ${quizData.length} questions loaded.`);
                updateUI();
            };
            r.readAsText(e.target.files[0]);
        };

        function updateUI() {
            const q = quizData[qIdx];
            if(!q) return;
            document.getElementById('q-meta').innerText = `QUESTION ${qIdx+1} / ${quizData.length} [${q.type.toUpperCase()}]`;
            document.getElementById('q-text').innerText = q.title;
            const mb = document.getElementById('media-frame');
            if(q.med) { document.getElementById('media-preview').src = q.med; mb.style.display = 'block'; }
            else mb.style.display = 'none';
            const grid = document.getElementById('choices-grid');
            grid.innerHTML = "";
            if(q.type !== 'text') {
                q.choices.split('|').forEach(c => {
                    const d = document.createElement('div');
                    d.className = "list-item"; d.innerText = c; grid.appendChild(d);
                });
            }
        }

        function updateFeed(d) {
            const f = document.getElementById('feed');
            const i = document.createElement('div');
            i.className = "list-item";
            i.innerHTML = `<span><b>${d.user}</b>: ${d.msg}</span> <span class="points-val">${d.pts>=0?'+'+d.pts:d.pts}</span>`;
            f.prepend(i);
        }

        function updateLeaderboard(s) {
            const l = document.getElementById('leaderboard'); l.innerHTML = "";
            Object.entries(s).sort((a,b)=>b[1]-a[1]).forEach(([n, sc]) => {
                const i = document.createElement('div');
                i.className = "list-item";
                i.innerHTML = `<span>${n}</span> <span class="points-val">${sc}</span>`;
                l.appendChild(i);
            });
        }

        function showTab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); btn.classList.add('active');
        }

        function saveSettings() { localStorage.setItem('s_time', document.getElementById('s-time').value); }
        function confirmReset() { if(confirm("This will permanently end the quiz and reset the room. Are you sure?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
