<!DOCTYPE html>
<html>
<head>
    <title>Quizmaster Pro Hub</title>
    <style>
        body { background: #0b0e14; color: #adbac7; font-family: sans-serif; display: flex; margin: 0; height: 100vh; }
        .side { width: 320px; border-right: 1px solid #333; padding: 20px; background: #1c2128; overflow-y: auto; }
        .main { flex: 1; padding: 30px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #q-view { background: #1c2128; border: 2px solid #444; border-radius: 15px; padding: 20px; width: 85%; margin: 15px 0; min-height: 120px; }
        #timer { font-size: 8rem; color: #00e676; margin: 0; font-weight: bold; line-height: 1; }
        .controls button { padding: 15px; border-radius: 8px; font-size: 1rem; cursor: pointer; margin: 5px; color: white; font-weight: bold; width: 220px; border: none; }
        .haze { background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #6200ee; text-align: left; }
        input[type="number"] { background: #000; color: #00e676; border: 1px solid #444; padding: 5px; width: 50px; font-size: 1.1rem; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="side">
        <h3>Live Leaderboard</h3>
        <div id="teams">Waiting for players...</div>
        <hr style="border:0.5px solid #333; margin:20px 0;">
        <div style="background:#2d333b; padding:15px; border-radius:10px;">
            Round Pts: <input type="number" id="pts" value="10"> <br><br>
            Penalty: <input type="number" id="pen" value="0">
        </div>
        <br>
        <button style="background:#444; width:100%; padding:10px; color:white; border-radius:5px; cursor:pointer;" onclick="document.getElementById('csv').click()">📁 LOAD CSV</button>
        <input type="file" id="csv" style="display:none">
    </div>

    <div class="main">
        <h1 id="code" style="color:#6200ee; font-size: 3rem; margin: 0;">ROOM: ----</h1>
        
        <div id="q-view">
            <h2 id="q-text" style="color:white;">Ready to Begin</h2>
            <div id="q-ans" style="color:#00e676; font-size: 1.2rem; font-weight:bold;"></div>
        </div>

        <div id="timer">30</div>

        <div class="controls">
            <button style="background:#238636" onclick="start()">🚀 START CLOCK</button><br>
            <button style="background:#ff9800" onclick="reveal()">👁️ REVEAL ANSWER</button><br>
            <button style="background:#007bff" onclick="next()">➡️ NEXT QUESTION</button>
        </div>
    </div>

    <audio id="buzzer-sound"></audio>

    <script>
        let ws, room, tInt;
        const aud = document.getElementById('buzzer-sound');

        // This function gets the room code and connects to the brain
        async function init() {
            try {
                const res = await fetch('https://my-pub-quiz.onrender.com/create-room');
                const data = await res.json();
                room = data.room_code;
                document.getElementById('code').innerText = "ROOM: " + room;
                
                ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/master/M`);
                
                ws.onmessage = (e) => {
                    const m = JSON.parse(e.data);
                    if (m.type === "BEEP") { aud.src = m.url; aud.play(); } 
                    if (m.type === "NEW_Q") {
                        document.getElementById('q-text').innerText = m.q.title;
                        document.getElementById('q-ans').innerText = "Correct: " + m.q.correct;
                    }
                    if (m.type === "UP") {
                        let h = "";
                        for(let t in m.teams) {
                            const last = m.teams[t].h[m.teams[t].h.length-1];
                            const status = last ? (last.is_c ? '✅' : '❌') : '⌛';
                            h += `<div class="haze"><b>${t}</b>: ${m.teams[t].s}pts<br>Last: ${status} ${last ? last.ans : '...'}</div>`;
                        }
                        document.getElementById('teams').innerHTML = h;
                    }
                };
            } catch (err) {
                document.getElementById('code').innerText = "OFFLINE - REFRESH";
            }
        }

        function start() {
            let s = 30; clearInterval(tInt);
            document.getElementById('timer').style.color = "#00e676";
            tInt = setInterval(() => {
                s--; document.getElementById('timer').innerText = s;
                if(s <= 5) document.getElementById('timer').style.color = "red";
                if(s <= 0) clearInterval(tInt);
            }, 1000);
            ws.send(JSON.stringify({type:"START", pts:document.getElementById('pts').value, pen:document.getElementById('pen').value}));
        }

        function reveal() { clearInterval(tInt); ws.send(JSON.stringify({type:"REVEAL"})); }
        function next() { 
            document.getElementById('timer').innerText="30"; 
            document.getElementById('timer').style.color = "#00e676";
            ws.send(JSON.stringify({type:"NEXT"})); 
        }

        document.getElementById('csv').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const rows = ev.target.result.split('\n').slice(1);
                const pk = rows.map(l => {
                    const c = l.split(',');
                    return {title:c[0], type:c[1], correct:c[2], pts:c[3], pen:c[4], med:c[5], choices: [c[6],c[7],c[8],c[9]].join('|')};
                });
                ws.send(JSON.stringify({type: "LOAD", payload: pk}));
                document.getElementById('q-text').innerText = "Quiz Loaded! Question 1 is ready.";
            };
            r.readAsText(e.target.files[0]);
        };

        // START THE ENGINE!
        init();
    </script>
</body>
</html>
