<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QUIZ MASTER | ULTIMATE CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22c55e; --danger: #ef4444; --warning: #f59e0b; --break: #a855f7; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR (LEFT) */
        #sidebar { width: 340px; background: var(--card); border-right: 4px solid #334155; display: flex; flex-direction: column; padding: 30px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .room-info { text-align: center; margin-bottom: 30px; padding: 25px; background: rgba(0,0,0,0.4); border-radius: 20px; border: 2px solid var(--primary); }
        #r-code { margin: 10px 0 0; color: var(--primary); font-size: 3.5rem; letter-spacing: 5px; font-weight: 800; line-height: 1; }
        
        .tab-btn { background: #334155; border: none; color: white; padding: 18px; margin: 10px 0; border-radius: 15px; cursor: pointer; text-align: left; font-weight: 600; display: flex; align-items: center; gap: 15px; font-size: 1.1rem; border-left: 5px solid transparent; }
        .tab-btn:hover { background: #475569; border-left: 5px solid var(--primary); }
        .tab-btn.active { background: var(--primary); box-shadow: 0 4px 25px rgba(99, 102, 241, 0.4); border-left: 5px solid white; }

        /* MAIN AREA */
        #main { flex: 1; padding: 50px; overflow-y: auto; background: radial-gradient(circle at top right, #1e1b4b, var(--bg)); position: relative; }
        .view { display: none; max-width: 1100px; margin: 0 auto; animation: slideUp 0.4s ease; }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--card); padding: 45px; border-radius: 35px; box-shadow: 0 30px 60px -12px rgba(0,0,0,0.6); border: 1px solid #334155; margin-bottom: 30px; text-align: center; }
        
        /* BIG TIMER (CENTER TOP) */
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        #timer-box { background: #000; color: var(--warning); padding: 15px 45px; border-radius: 20px; font-weight: 900; font-size: 3.5rem; border: 5px solid var(--warning); box-shadow: 0 0 30px rgba(245, 158, 11, 0.4); }
        #q-meta { color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 3px; font-size: 1.2rem; }

        #q-text { font-size: 2.8rem; font-weight: 800; margin: 30px 0; color: #fff; line-height: 1.2; }

        /* THE 5-BUTTON GRID (LAYOUT FROM IMAGE) */
        .control-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin-top: 40px; }
        .btn-huge { padding: 30px; border-radius: 22px; border: none; cursor: pointer; font-weight: 800; font-size: 1.4rem; transition: 0.2s; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn-next { background: var(--warning); color: #000; }
        .btn-start { background: var(--accent); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-break { background: var(--break); color: white; }
        .btn-end { background: #0f172a; color: var(--danger); grid-column: span 2; border: 4px solid var(--danger); margin-top: 10px; }
        .btn-huge:hover { transform: translateY(-5px); filter: brightness(1.2); }

        #media-frame { width: 100%; max-height: 400px; border-radius: 25px; overflow: hidden; margin: 25px 0; display: none; border: 5px solid #334155; }
        .list-item { background: rgba(0,0,0,0.3); padding: 22px 35px; border-radius: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; border-left: 8px solid var(--primary); font-size: 1.3rem; }
        .pts-val { font-weight: 900; color: var(--primary); font-size: 1.8rem; }

        #login-gate { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <audio id="audio-engine"></audio>

    <div id="login-gate">
        <div style="background: var(--card); padding: 70px; border-radius: 40px; text-align: center; width: 450px; border: 1px solid #334155;">
            <h1 style="margin-bottom:30px; font-weight:800; color:var(--primary);">HOST TERMINAL</h1>
            <input type="text" id="usr" placeholder="Username" style="width:100%; padding:20px; margin:10px 0; border-radius:15px; border:none; background:#0f172a; color:white; font-size:1.1rem;">
            <input type="password" id="pwd" placeholder="Password" style="width:100%; padding:20px; margin:15px 0; border-radius:15px; border:none; background:#0f172a; color:white; font-size:1.1rem;">
            <button onclick="login()" class="btn-huge btn-start" style="width:100%; margin-top:20px;">Launch Engine</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="room-info"><div>ROOM CODE</div><h2 id="r-code">----</h2></div>
        <button class="tab-btn active" onclick="showTab('q-view', this)">🎮 Control Panel</button>
        <button class="tab-btn" onclick="showTab('f-view', this)">⚡ Activity Feed</button>
        <button class="tab-btn" onclick="showTab('l-view', this)">🏆 Leaderboard</button>
        <button class="tab-btn" onclick="showTab('s-view', this)">⚙️ Settings</button>
        <div style="margin-top: auto; padding-top: 30px; border-top: 2px solid #334155;">
            <input type="file" id="csv" style="display:none" accept=".csv">
            <button onclick="document.getElementById('csv').click()" class="tab-btn" style="width:100%; background: #475569; justify-content: center;">📁 LOAD CSV QUIZ</button>
        </div>
    </div>

    <div id="main">
        <div id="q-view" class="view active">
            <div class="card">
                <div class="header-box"><span id="q-meta">Ready</span><div id="timer-box">00s</div></div>
                <h1 id="q-text">Upload Spreadsheet to Begin</h1>
                <div id="media-frame"><img id="media-preview" style="width:100%; height:100%; object-fit:contain;"></div>
            </div>
            <div class="control-grid">
                <button class="btn-huge btn-next" onclick="send('PREP')">⏭️ Next Question</button>
                <button class="btn-huge btn-start" onclick="send('START')">🏁 Start Question</button>
                <button class="btn-huge btn-stop" onclick="send('STOP')">⛔ Stop Timer</button>
                <button class="btn-huge btn-break" onclick="send('BREAK')">☕ Take a Break</button>
                <button class="btn-huge btn-end" onclick="confirmReset()">🛑 Reset Room</button>
            </div>
        </div>

        <div id="f-view" class="view"><h1>Activity Feed</h1><div id="feed"></div></div>
        <div id="l-view" class="view"><h1>Tournament Leaderboard</h1><div id="leaderboard"></div></div>
        <div id="s-view" class="view"><h1>Settings</h1><input type="number" id="s-time" value="20" style="padding:20px; background:#0f172a; color:white; font-size:2rem; border-radius:15px; border:none; width:150px;"></div>
    </div>

    <script>
        let ws, room = "", qIdx = -1, quizData = [];
        const audio = document.getElementById('audio-engine');

        async function login() {
            const res = await fetch('https://my-pub-quiz.onrender.com/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: document.getElementById('usr').value, password: document.getElementById('pwd').value}) });
            const data = await res.json();
            if(data.success) { room = data.room_code; localStorage.setItem('quiz_room', room); location.reload(); }
        }

        window.onload = () => { if(localStorage.getItem('quiz_room')) { room = localStorage.getItem('quiz_room'); document.getElementById('login-gate').classList.add('hidden'); document.getElementById('r-code').innerText = room; connectWS(); } };

        function connectWS() {
            ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/master/M`);
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if(msg.type === "FEED") updateFeed(msg.payload);
                if(msg.type === "SCORES") updateLeaderboard(msg.payload);
            };
        }

        function send(type) {
            if(type === 'PREP') { qIdx++; audio.pause(); audio.src = ""; }
            const q = quizData[qIdx];
            let payload = { idx: qIdx };
            if(type === 'PREP' && q) payload = { idx: qIdx, title: q.title, type: q.type, choices: q.choices.split('|'), med: q.med };
            if(type === 'START') {
                payload.limit = document.getElementById('s-time').value;
                if(q && q.med && (q.med.includes('.mp3') || q.med.includes('.ogg'))) { audio.src = q.med; audio.play(); }
                let c = payload.limit;
                const t = setInterval(() => { c--; document.getElementById('timer-box').innerText = (c<0?0:c)+"s"; if(c<=0) clearInterval(t); }, 1000);
            }
            if(type === 'STOP') audio.pause();
            ws.send(JSON.stringify({type, payload}));
            if(type === 'PREP') updateUI();
        }

        document.getElementById('csv').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
                quizData = lines.slice(1).map(l => {
                    const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let rt = (c[1]||'multi').toLowerCase();
                    return { title: c[2].replace(/"/g,""), type: rt.includes('seq')?'sequence':(rt.includes('multi')?'multi':'text'), correct: c[3].replace(/"/g,""), pts: c[4]||10, pen: c[5]||0, med: c[6]?c[6].trim():"", choices: [c[7],c[8],c[9],c[10],c[11],c[12]].filter(x=>x).join('|').replace(/"/g,"") };
                });
                ws.send(JSON.stringify({type:"LOAD", payload: quizData}));
                alert("SUCCESS: Loaded " + quizData.length + " questions!");
                updateUI();
            };
            r.readAsText(e.target.files[0]);
        };

        function updateUI() {
            const q = quizData[qIdx];
            if(!q) return;
            document.getElementById('q-meta').innerText = `QUESTION ${qIdx+1} / ${quizData.length}`;
            document.getElementById('q-text').innerText = q.title
