<!DOCTYPE html>
<html>
<head>
    <title>Quizmaster Control Suite</title>
    <style>
        :root { --p: #6200ee; --bg: #0b0e14; --card: #1c2128; --gold: #ffd700; }
        body { background: var(--bg); color: #adbac7; font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        .sidebar { width: 380px; background: var(--card); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .tab-bar { display: flex; background: #000; }
        .tab { flex: 1; padding: 15px; border: none; background: none; color: #666; cursor: pointer; font-weight: bold; }
        .tab.active { color: var(--p); border-bottom: 3px solid var(--p); }
        #timer { font-size: 10rem; font-weight: 900; color: #00e676; line-height: 1; margin: 5px 0; }
        .q-display { background: var(--card); padding: 20px; border-radius: 25px; width: 90%; border: 2px solid #444; position: relative; }
        #q-media img { max-width: 100%; max-height: 250px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #555; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-start { background: #238636; grid-column: span 2; font-size: 1.3rem; }
        .btn-rev-m { background: #ff9800; } .btn-rev-p { background: #007bff; }
        .btn-next { background: var(--p); } .btn-end { background: #d73a49; }
        .team-card { background: #000; padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 5px solid var(--p); text-align: left; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="tab-bar"><button class="tab active" id="l-tab" onclick="setTab('lobby')">LOBBY</button><button class="tab" id="s-tab" onclick="setTab('stats')">STATS</button></div>
        <div id="side-list" style="flex:1; padding:20px; overflow-y:auto;"></div>
        <div style="padding:20px; background:#000;">
            Pts: <input type="number" id="pts" value="10" style="width:40px;"> Pen: <input type="number" id="pen" value="0" style="width:40px;">
            <button style="background:#444; width:100%; margin-top:10px;" onclick="document.getElementById('csv').click()">📁 LOAD CSV</button>
            <input type="file" id="csv" style="display:none">
        </div>
    </div>
    <div class="main">
        <div id="room-id" style="font-weight:bold; color:var(--p); margin-bottom:5px;">ROOM: ----</div>
        <div class="q-display" id="q-box">
            <div id="q-media"></div>
            <h1 id="q-title" style="margin:10px 0;">Ready to Host?</h1>
            <h2 id="q-ans" style="color:#00e676; display:none; background: rgba(0,230,118,0.1); padding: 10px; border-radius: 10px;"></h2>
        </div>
        <div id="timer">30</div>
        <div class="controls">
            <button class="btn-start" onclick="start()">🚀 START QUESTION</button>
            <button class="btn-rev-m" onclick="revM()">👁️ MASTER REVEAL</button>
            <button class="btn-rev-p" onclick="revP()">📢 PLAYER REVEAL</button>
            <button class="btn-next" onclick="next()">➡️ PREP NEXT Q</button>
            <button class="btn-end" onclick="endQ()">🛑 END QUIZ</button>
        </div>
    </div>
    <audio id="tick-snd" src="https://www.soundjay.com/buttons/beep-07.mp3"></audio>
    <script>
        let ws, room, tInt, currentQ, teams = {}, curTab = 'lobby'; const tick = document.getElementById('tick-snd');
        async function init() {
            const res = await fetch('https://my-pub-quiz.onrender.com/create-room'); const data = await res.json(); room = data.room_code; document.getElementById('room-id').innerText = "ROOM: " + room;
            ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/master/M`);
            ws.onmessage = (e) => { 
                const m = JSON.parse(e.data); 
                if(m.type === "BEEP") new Audio(m.url).play(); 
                if(m.type === "UP") { teams = m.teams; currentQ = m.q; updateUI(m.status); } 
            };
        }
        function setTab(t) { curTab = t; document.getElementById('l-tab').classList.toggle('active', t==='lobby'); document.getElementById('s-tab').classList.toggle('active', t==='stats'); updateUI(); }
        function updateUI(status) {
            let h = ""; for(let name in teams) { const t = teams[name]; if(curTab === 'lobby') h += `<div class="team-card" style="border-color:${t.c}"><b>${name}</b><br>Score: ${t.s}</div>`; else h += `<div class="team-card"><b>${name}</b><br>🔥 Streak: ${t.ms} | ⚡ Fast: ${t.fc}<br>🎯 Correct: ${Math.round((t.h.filter(x=>x.is_c).length/(t.h.length||1))*100)}%</div>`; }
            document.getElementById('side-list').innerHTML = h;
            if(currentQ) {
                let isJ = currentQ.type.startsWith('jackpot');
                document.getElementById('q-title').innerText = (isJ?"🏆 JACKPOT: ":"") + currentQ.title;
                document.getElementById('q-box').style.borderColor = isJ? "var(--gold)":"#444";
                
                // MEDIA LOGIC
                const mBox = document.getElementById('q-media'); mBox.innerHTML = "";
                if(currentQ.med && currentQ.med.startsWith('http')) {
                    if(currentQ.med.match(/\.(jpeg|jpg|gif|png|webp)$/i)) mBox.innerHTML = `<img src="${currentQ.med}">`;
                }
            }
            if(status === "idle") document.getElementById('q-ans').style.display = "none";
        }
        function start() {
            if(currentQ && currentQ.med && currentQ.med.match(/\.(mp3|wav|ogg)$/i)) new Audio(currentQ.med).play();
            let s = 30; clearInterval(tInt);
            tInt = setInterval(() => { s--; document.getElementById('timer').innerText = s; if(s <= 10) tick.play(); if(s <= 0) clearInterval(tInt); }, 1000);
            ws.send(JSON.stringify({type: "START", pts: document.getElementById('pts').value, pen: document.getElementById('pen').value}));
        }
        function revM() { document.getElementById('q-ans').innerText = "Correct Answer: " + currentQ.correct; document.getElementById('q-ans').style.display = "block"; ws.send(JSON.stringify({type:"REVEAL_MASTER"})); }
        function revP() { ws.send(JSON.stringify({type: "REVEAL_PLAYER"})); }
        function next() { document.getElementById('timer').innerText = "30"; ws.send(JSON.stringify({type: "NEXT"})); }
        function endQ() { if(confirm("End Quiz and Declare Winner?")) ws.send(JSON.stringify({type:"END"})); }
        document.getElementById('csv').onchange = (e) => {
            const r = new FileReader(); r.onload = (ev) => {
                const lines = ev.target.result.split('\n').filter(l => l.trim());
                const pk = lines.slice(1).map(l => {
                    const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {title:c[0].replace(/"/g,""), type:c[1]||'multi', correct:c[2].replace(/"/g,""), med:c[5] ? c[5].trim() : "", choices: [c[6],c[7],c[8],c[9],c[10],c[11]].join('|').replace(/"/g,"")};
                });
                ws.send(JSON.stringify({type: "LOAD", payload: pk})); alert("Quiz Loaded Successfully!");
            }; r.readAsText(e.target.files[0]);
        }; init();
    </script>
</body>
</html>
