<!DOCTYPE html>
<html>
<head>
    <title>Master Hub - Live Quiz</title>
    <style>
        body { background: #0b0e14; color: #adbac7; font-family: sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        .side { width: 320px; border-right: 1px solid #333; padding: 20px; background: #1c2128; overflow-y: auto; }
        .main { flex: 1; padding: 30px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #q-view { background: #1c2128; border: 2px solid #444; border-radius: 15px; padding: 25px; width: 85%; margin-bottom: 20px; min-height: 150px; }
        #q-text { font-size: 2.2rem; color: #fff; margin-bottom: 10px; font-weight: bold; }
        #q-ans { font-size: 1.5rem; color: #00e676; font-weight: bold; }
        #timer { font-size: 8rem; color: #00e676; margin: 5px 0; line-height: 1; font-weight: bold; }
        .controls button { padding: 15px 25px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; margin: 8px; color: white; font-weight: bold; width: 220px; border: none; }
        .btn-start { background: #238636; } .btn-rev { background: #ff9800; } .btn-next { background: #007bff; }
        .haze { background: #000; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #6200ee; text-align: left; }
    </style>
</head>
<body>
    <div class="side">
        <h3>Live Feed</h3>
        <div id="teams">Waiting for players...</div>
        <hr style="border:0.5px solid #333; margin:20px 0;">
        <button style="background:#444; color:white; width:100%; padding:10px; border-radius:5px; cursor:pointer;" onclick="document.getElementById('csv').click()">📁 LOAD CSV</button>
        <input type="file" id="csv" style="display:none">
    </div>

    <div class="main">
        <h2 id="code" style="color: #6200ee; margin:0;">ROOM: ----</h2>
        <div id="q-view">
            <div id="q-text">Upload CSV to start</div>
            <div id="q-ans"></div>
        </div>
        <div id="timer">30</div>
        <div class="controls">
            <button class="btn-start" onclick="start()">🚀 START CLOCK</button><br>
            <button class="btn-rev" onclick="reveal()">👁️ REVEAL ANSWER</button><br>
            <button class="btn-next" onclick="next()">➡️ NEXT QUESTION</button>
        </div>
    </div>
    <audio id="aud"></audio>

    <script>
        let ws, room, tInt, quizData = [], qIdx = 0;
        const aud = document.getElementById('aud');

        async function init() {
            const res = await fetch('https://my-pub-quiz.onrender.com/create-room');
            const data = await res.json();
            room = data.room_code;
            document.getElementById('code').innerText = "ROOM: " + room;
            ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/master/M`);
            ws.onmessage = (e) => {
                const m = JSON.parse(e.data);
                if (m.type === "BEEP") { aud.src = m.url; aud.play(); }
                if (m.type === "UP") updateFeed(m.teams);
            };
        }

        function updateFeed(ts) {
            let h = "";
            for(let t in ts) {
                const last = ts[t].h[ts[t].h.length-1];
                h += `<div class="haze"><b>${t}</b>: ${ts[t].s}pts<br>${last ? (last.is_c?'✅':'❌')+' Ans: '+last.ans : '...'}</div>`;
            }
            document.getElementById('teams').innerHTML = h;
        }

        // SHOW THE QUESTION ON YOUR SCREEN LOCALLY
        function showQ() {
            if (!quizData[qIdx]) return;
            const q = quizData[qIdx];
            document.getElementById('q-text').innerText = `Q${qIdx+1}: ${q.title}`;
            document.getElementById('q-ans').innerText = ""; // Hide answer until you hit Reveal
        }

        function start() {
            if (quizData.length === 0) return alert("Upload CSV first!");
            showQ();
            let s = 30; clearInterval(tInt);
            document.getElementById('timer').style.color = "#00e676";
            tInt = setInterval(() => {
                s--; document.getElementById('timer').innerText = s;
                if(s<=5) document.getElementById('timer').style.color = "red";
                if(s<=0) clearInterval(tInt);
            }, 1000);
            ws.send(JSON.stringify({type:"START", pts:10, pen:0}));
        }

        function reveal() {
            clearInterval(tInt);
            if (quizData[qIdx]) document.getElementById('q-ans').innerText = "CORRECT: " + quizData[qIdx].correct;
            ws.send(JSON.stringify({type:"REVEAL"}));
        }

        function next() {
            qIdx++;
            document.getElementById('timer').innerText = "30";
            document.getElementById('timer').style.color = "#00e676";
            showQ();
            ws.send(JSON.stringify({type:"NEXT"}));
        }

        document.getElementById('csv').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const lines = ev.target.result.split('\n').filter(l => l.trim() !== "");
                quizData = lines.slice(1).map(line => {
                    const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // Better comma handling
                    return {
                        title: c[0].replace(/"/g, ""), 
                        type: c[1], 
                        correct: c[2],
                        choices: [c[6],c[7],c[8],c[9],c[10],c[11]].filter(x => x && x.trim() !== "").join('|').replace(/"/g, "")
                    };
                });
                qIdx = 0;
                document.getElementById('q-text').innerText = "Quiz Loaded! Ready for Question 1.";
                ws.send(JSON.stringify({type: "LOAD", payload: quizData}));
            };
            r.readAsText(e.target.files[0]);
        };
        init();
    </script>
</body>
</html>
