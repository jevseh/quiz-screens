<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tab-active { background-color: #1e293b; border-left: 4px solid #3b82f6; }
        .hidden { display: none !important; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="flex-1 flex items-center justify-center">
        <div class="glass-panel p-8 rounded-xl w-96 shadow-2xl">
            <h1 class="text-3xl font-bold mb-6 text-center text-blue-400">Master Login</h1>
            <input type="text" id="host-user" placeholder="Host Username (e.g., host1)" class="w-full p-3 mb-4 rounded bg-slate-800 border border-slate-600 focus:outline-none focus:border-blue-500">
            <input type="password" id="host-pass" placeholder="Password" class="w-full p-3 mb-6 rounded bg-slate-800 border border-slate-600 focus:outline-none focus:border-blue-500">
            <button onclick="loginMaster()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded transition-colors">Login & Create Room</button>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden h-full flex flex-col">
        
        <header class="glass-panel p-4 flex justify-between items-center shadow-md z-10">
            <div class="flex items-center space-x-6">
                <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">PUB QUIZ PRO</h1>
                <div class="bg-slate-800 px-4 py-1 rounded-full border border-slate-600">
                    <span class="text-slate-400 text-sm uppercase">Room Code:</span>
                    <span id="room-code-display" class="ml-2 font-mono text-xl font-bold text-yellow-400">----</span>
                </div>
            </div>
            <div class="flex space-x-4 items-center">
                <button onclick="toggleBreak()" id="break-btn" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded font-semibold text-sm transition">Start Break</button>
                <button onclick="declareWinner()" class="bg-yellow-600 hover:bg-yellow-500 px-4 py-2 rounded font-semibold text-sm transition text-white">Declare Winner</button>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded font-semibold text-sm transition">Log Out</button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            
            <aside class="w-72 glass-panel border-r border-slate-700 flex flex-col">
                <div class="flex border-b border-slate-700">
                    <button onclick="switchTab('teams')" id="tab-teams" class="flex-1 py-3 text-sm font-bold tab-active transition">Teams Status</button>
                    <button onclick="switchTab('leaderboard')" id="tab-leaderboard" class="flex-1 py-3 text-sm font-bold bg-slate-800 transition">Leaderboard</button>
                </div>
                
                <div id="content-teams" class="flex-1 overflow-y-auto p-4 space-y-3">
                    </div>
                
                <div id="content-leaderboard" class="hidden flex-1 overflow-y-auto p-4 space-y-3">
                    </div>
            </aside>

            <main class="flex-1 flex flex-col relative">
                
                <div id="csv-overlay" class="absolute inset-0 bg-slate-900/90 z-20 flex flex-col items-center justify-center backdrop-blur-sm">
                    <h2 class="text-2xl font-bold mb-4">Upload Question Pack</h2>
                    <input type="file" id="csv-upload" accept=".csv" class="mb-4 block w-full max-w-md text-sm text-slate-400 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-500">
                </div>

                <div class="flex-1 p-8 overflow-y-auto flex flex-col items-center justify-center">
                    <div id="current-question-container" class="w-full max-w-4xl text-center hidden">
                        <span id="cq-type" class="text-blue-400 font-bold uppercase tracking-wider text-sm mb-2 block"></span>
                        <h2 id="cq-text" class="text-4xl font-black mb-8 leading-tight text-white"></h2>
                        <div id="cq-media" class="mb-6 flex justify-center"></div>
                        <div id="cq-options" class="grid grid-cols-2 gap-4 mb-8"></div>
                        
                        <div class="glass-panel inline-block px-8 py-4 rounded-2xl border border-slate-600">
                            <span class="text-slate-400 block mb-1 text-sm">Correct Answer</span>
                            <span id="cq-answer" class="text-2xl font-bold text-green-400"></span>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-6 border-t border-slate-700 flex justify-center items-center space-x-8">
                    <div class="text-center">
                        <span class="block text-slate-400 text-sm mb-1">Timer</span>
                        <div id="timer-display" class="text-4xl font-mono font-bold text-white">00:30</div>
                    </div>
                    <div class="flex flex-col space-y-2">
                        <div class="flex space-x-2">
                            <button onclick="startTimer()" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded font-bold shadow">Start</button>
                            <button onclick="stopTimer()" class="bg-red-600 hover:bg-red-500 px-6 py-2 rounded font-bold shadow">Stop</button>
                        </div>
                        <button onclick="addTime(15)" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-sm shadow">+15 Seconds</button>
                    </div>
                </div>
            </main>
        </div>

        <footer class="h-32 glass-panel border-t border-slate-700 flex">
            <div class="flex-1 border-r border-slate-700 p-4 flex flex-col justify-center">
                <span class="text-xs text-slate-400 uppercase font-bold tracking-wider mb-1">Next Question (Press Space to Send)</span>
                <p id="nq-text" class="text-lg font-semibold text-slate-300 truncate">Load CSV to begin...</p>
                <div class="mt-2 flex space-x-4 text-sm">
                    <label class="flex items-center space-x-2">
                        <span class="text-slate-400">Pts:</span>
                        <input type="number" id="mod-points" class="w-16 bg-slate-800 border border-slate-600 rounded px-2 py-1 text-white">
                    </label>
                    <label class="flex items-center space-x-2">
                        <span class="text-slate-400">Pen:</span>
                        <input type="number" id="mod-penalty" class="w-16 bg-slate-800 border border-slate-600 rounded px-2 py-1 text-white">
                    </label>
                    <button onclick="sendNextQuestion()" class="ml-auto bg-blue-600 hover:bg-blue-500 px-6 py-1 rounded font-bold">Send to Players</button>
                </div>
            </div>

            <div class="w-80 p-4 flex flex-col justify-center space-y-3">
                <div class="flex items-center justify-between">
                    <span class="text-sm font-semibold text-slate-300">Buzzer Volume</span>
                    <input type="range" id="vol-buzzer" min="0" max="100" value="100" class="w-32">
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm font-semibold text-slate-300">Countdown Audio</span>
                    <div class="flex items-center space-x-2">
                        <input type="range" id="vol-timer" min="0" max="100" value="80" class="w-24">
                        <button onclick="toggleMute('timer')" id="mute-timer-btn" class="text-xs bg-slate-700 px-2 py-1 rounded hover:bg-slate-600">Mute</button>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // --- STATE & CONFIG ---
        const BACKEND_URL = 'https://my-pub-quiz.onrender.com'; 
        const WS_URL = 'wss://my-pub-quiz.onrender.com/ws/master/';
        
        let ws;
        let roomCode = "";
        let questions = [];
        let currentQuestionIndex = -1;
        let gameScores = {};
        let teamStatus = {}; // Tracks who has answered
        let timerInterval;
        let timeLeft = 30;
        let isBreak = false;

        // Mock sounds (replace with actual URLs later)
        const timerAudio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        
        // --- INIT ---
        document.getElementById('csv-upload').addEventListener('change', handleCSVUpload);

        // Keyboard Shortcut: Space to send next question
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !document.getElementById('dashboard-screen').classList.contains('hidden')) {
                // Prevent scrolling
                e.preventDefault(); 
                sendNextQuestion();
            }
        });

        // --- AUTH & WEBSOCKET ---
        async function loginMaster() {
            const user = document.getElementById('host-user').value;
            const pass = document.getElementById('host-pass').value;

            try {
                const res = await fetch(`${BACKEND_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (res.ok) {
                    // Generate a random 4-letter room code
                    roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
                    connectWebSocket(roomCode);
                    
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard-screen').classList.remove('hidden');
                    document.getElementById('room-code-display').innerText = roomCode;
                } else {
                    alert("Invalid Host Credentials");
                }
            } catch (err) {
                alert("Cannot connect to backend. Is it awake?");
            }
        }

        function connectWebSocket(code) {
            ws = new WebSocket(`${WS_URL}${code}`);
            
            ws.onopen = () => console.log("Connected to room:", code);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === "player_joined") {
                    gameScores[data.team_name] = gameScores[data.team_name] || 0;
                    teamStatus[data.team_name] = { answered: false, buzzer: null };
                    updateSidebars();
                } 
                else if (data.type === "answer_submitted") {
                    handlePlayerAnswer(data);
                }
                else if (data.type === "buzzer_selected") {
                    if (teamStatus[data.team_name]) {
                        teamStatus[data.team_name].buzzer = data.selection;
                    }
                }
            };

            ws.onclose = () => {
                console.log("Disconnected. Retrying in 3s...");
                setTimeout(() => connectWebSocket(code), 3000);
            };
        }

        function logout() {
            if(confirm("Log out? This will disconnect your master session.")) {
                if(ws) ws.close();
                location.reload();
            }
        }

        // --- GAME LOGIC ---
        function handleCSVUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    questions = results.data;
                    document.getElementById('csv-overlay').classList.add('hidden');
                    prepareNextQuestion();
                }
            });
        }

        function prepareNextQuestion() {
            if (currentQuestionIndex + 1 < questions.length) {
                const nextQ = questions[currentQuestionIndex + 1];
                document.getElementById('nq-text').innerText = `${nextQ['Question number']}. ${nextQ['Question']}`;
                document.getElementById('mod-points').value = nextQ['Points'];
                document.getElementById('mod-penalty').value = nextQ['Penalty'] || 0;
            } else {
                document.getElementById('nq-text').innerText = "END OF QUIZ";
            }
        }

        function sendNextQuestion() {
            if (currentQuestionIndex + 1 >= questions.length) return;
            
            currentQuestionIndex++;
            const q = questions[currentQuestionIndex];
            
            // Apply customized points/penalties
            q['Points'] = document.getElementById('mod-points').value;
            q['Penalty'] = document.getElementById('mod-penalty').value;

            // Update UI Center
            document.getElementById('current-question-container').classList.remove('hidden');
            document.getElementById('cq-type').innerText = q['Question type'];
            document.getElementById('cq-text').innerText = q['Question'];
            document.getElementById('cq-answer').innerText = q['Correct answer'];
            
            // Handle Media
            const mediaContainer = document.getElementById('cq-media');
            if (q['Media LINK']) {
                mediaContainer.innerHTML = `<img src="${q['Media LINK']}" class="max-h-64 rounded-lg border-2 border-slate-600 shadow-lg">`;
            } else {
                mediaContainer.innerHTML = "";
            }

            // Options Display
            const optsContainer = document.getElementById('cq-options');
            optsContainer.innerHTML = "";
            ['Answer A', 'Answer B', 'Answer C', 'Answer D', 'Answer E', 'Answer F'].forEach(opt => {
                if(q[opt]) {
                    optsContainer.innerHTML += `<div class="bg-slate-800 p-3 rounded text-sm text-slate-300 border border-slate-700">${q[opt]}</div>`;
                }
            });

            // Reset Team Answer Status
            for(let team in teamStatus) teamStatus[team].answered = false;
            updateSidebars();

            // Send via WS
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: "send_question",
                    question_data: q
                }));
            }

            timeLeft = 30; // Reset timer display
            updateTimerDisplay();
            prepareNextQuestion();
        }

        function handlePlayerAnswer(data) {
            const { team_name, answer, is_first } = data;
            
            // Mark as answered
            if(teamStatus[team_name]) teamStatus[team_name].answered = true;
            
            // Fastest finger logic & Sound
            if (is_first && teamStatus[team_name]?.buzzer) {
                const vol = document.getElementById('vol-buzzer').value / 100;
                // Play specific buzzer logic here based on teamStatus[team_name].buzzer.sound
                console.log(`Buzzer played for ${team_name} at volume ${vol}`);
            }

            // Auto-grade logic (simplified for POC, you can expand string matching)
            const correctAns = questions[currentQuestionIndex]['Correct answer'].toString().toLowerCase();
            const playerAns = answer.toString().toLowerCase();
            const pts = parseInt(questions[currentQuestionIndex]['Points']);
            const pen = parseInt(questions[currentQuestionIndex]['Penalty']);

            // Supports first letter matching as requested
            if (playerAns === correctAns || playerAns === correctAns.charAt(0)) {
                gameScores[team_name] += pts;
                if (is_first) gameScores[team_name] += 5; // Fast finger bonus
            } else {
                gameScores[team_name] -= pen;
            }

            // Send updated scores to players
            ws.send(JSON.stringify({ action: "update_scores", scores: gameScores }));
            updateSidebars();
        }

        // --- UI & TIMERS ---
        function startTimer() {
            stopTimer();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                // Play audio in last 10 seconds if not muted
                if (timeLeft <= 10 && timeLeft > 0 && document.getElementById('mute-timer-btn').innerText === 'Mute') {
                    timerAudio.volume = document.getElementById('vol-timer').value / 100;
                    timerAudio.play().catch(e=>console.log(e));
                }
                
                if (timeLeft <= 0) stopTimer();
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function addTime(secs) {
            timeLeft += secs;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }

        function toggleMute(target) {
            const btn = document.getElementById(`mute-${target}-btn`);
            if(btn.innerText === 'Mute') {
                btn.innerText = 'Unmute';
                btn.classList.replace('bg-slate-700', 'bg-red-600');
            } else {
                btn.innerText = 'Mute';
                btn.classList.replace('bg-red-600', 'bg-slate-700');
            }
        }

        // --- SIDEBAR TABS ---
        function switchTab(tab) {
            document.getElementById('tab-teams').className = tab === 'teams' ? 'flex-1 py-3 text-sm font-bold tab-active transition' : 'flex-1 py-3 text-sm font-bold bg-slate-800 transition text-slate-400';
            document.getElementById('tab-leaderboard').className = tab === 'leaderboard' ? 'flex-1 py-3 text-sm font-bold tab-active transition' : 'flex-1 py-3 text-sm font-bold bg-slate-800 transition text-slate-400';
            
            document.getElementById('content-teams').classList.toggle('hidden', tab !== 'teams');
            document.getElementById('content-leaderboard').classList.toggle('hidden', tab !== 'leaderboard');
            updateSidebars();
        }

        function updateSidebars() {
            // Teams Tab
            const tContainer = document.getElementById('content-teams');
            tContainer.innerHTML = "";
            for (let team in teamStatus) {
                const color = teamStatus[team].buzzer ? teamStatus[team].buzzer.color : '#475569';
                const ansIcon = teamStatus[team].answered ? '✅' : '⏳';
                tContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-800 p-3 rounded border-l-4" style="border-color: ${color}">
                        <span class="font-semibold">${team}</span>
                        <span>${ansIcon}</span>
                    </div>`;
            }

            // Leaderboard Tab
            const lContainer = document.getElementById('content-leaderboard');
            lContainer.innerHTML = "";
            const sorted = Object.entries(gameScores).sort((a, b) => b[1] - a[1]);
            sorted.forEach(([team, score], index) => {
                lContainer.innerHTML += `
                    <div class="flex justify-between items-center p-2 border-b border-slate-700">
                        <span class="text-slate-300 font-bold">${index + 1}. ${team}</span>
                        <span class="text-blue-400 font-black">${score} pts</span>
                    </div>`;
            });
        }

        // --- QUIZ FLOW ---
        function toggleBreak() {
            isBreak = !isBreak;
            const btn = document.getElementById('break-btn');
            if (isBreak) {
                btn.innerText = "End Break";
                btn.classList.replace('bg-slate-700', 'bg-purple-600');
                if(ws) ws.send(JSON.stringify({ action: "trigger_break", leaderboard: gameScores }));
                switchTab('leaderboard'); // Auto show leaderboard on break
            } else {
                btn.innerText = "Start Break";
                btn.classList.replace('bg-purple-600', 'bg-slate-700');
                if(ws) ws.send(JSON.stringify({ action: "end_break" }));
            }
        }

        function declareWinner() {
            if(confirm("DOUBLE CONFIRMATION: Are you sure you want to end the quiz and declare a winner?")) {
                const sorted = Object.entries(gameScores).sort((a, b) => b[1] - a[1]);
                const winner = sorted.length > 0 ? sorted[0][0] : "No One";
                if(ws) ws.send(JSON.stringify({ action: "declare_winner", winner: winner }));
                alert(`Quiz Ended! Winner is ${winner}`);
            }
        }
    </script>
</body>
</html>
