<!DOCTYPE html>
<html>
<head>
    <title>Master Hub</title>
    <style>
        body { background: #0b0e14; color: #adbac7; font-family: sans-serif; display: flex; margin: 0; height: 100vh; }
        .side { width: 300px; border-right: 1px solid #444; padding: 20px; background: #1c2128; overflow-y: auto; }
        .main { flex: 1; padding: 40px; text-align: center; }
        #timer { font-size: 8rem; color: #00e676; margin: 10px 0; }
        button { padding: 15px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; margin: 5px; color: white; font-weight: bold; width: 220px; border: none; }
        .haze { background: #000; padding: 10px; border-radius: 5px; margin-bottom: 10px; border-left: 4px solid #ff4444; text-align: left; }
    </style>
</head>
<body>
    <div class="side">
        <h3>Live Feed</h3>
        <div id="teams">No teams joined yet...</div>
    </div>
    <div class="main">
        <h1 id="code">ROOM: ----</h1>
        <div id="timer">30</div>
        <button style="background:#238636" onclick="start()">🚀 START CLOCK</button><br>
        <button style="background:#ff9800" onclick="reveal()">👁️ REVEAL ANSWER</button><br>
        <button style="background:#007bff" onclick="next()">➡️ NEXT QUESTION</button><br>
        <hr style="border:0.5px solid #444; margin:20px 0;">
        <button style="background:#444" onclick="document.getElementById('csv').click()">📁 UPLOAD CSV</button>
        <input type="file" id="csv" style="display:none">
    </div>

    <script>
        let ws, room, tInt;
        async function init() {
            const res = await fetch('https://my-pub-quiz.onrender.com/create-room');
            const data = await res.json();
            room = data.room_code;
            document.getElementById('code').innerText = "ROOM: " + room;
            ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/master/M`);
            ws.onmessage = (e) => {
                const m = JSON.parse(e.data);
                if(m.type === "UP") updateFeed(m.teams);
            };
        }

        function updateFeed(ts) {
            let h = "";
            for(let t in ts) {
                const last = ts[t].h[ts[t].h.length-1];
                h += `<div class="haze"><b>${t}</b>: ${ts[t].s}pts<br>${last ? (last.is_c ? '✅' : '❌') + ' Ans: ' + last.ans : 'Waiting...'}</div>`;
            }
            document.getElementById('teams').innerHTML = h;
        }

        function start() {
            let s = 30; clearInterval(tInt);
            document.getElementById('timer').style.color = "#00e676";
            tInt = setInterval(() => {
                s--; document.getElementById('timer').innerText = s;
                if(s<=5) document.getElementById('timer').style.color = "red";
                if(s<=0) clearInterval(tInt);
            }, 1000);
            ws.send(JSON.stringify({type: "START", pts: 10, pen: 0}));
        }

        function reveal() { clearInterval(tInt); ws.send(JSON.stringify({type: "REVEAL"})); }
        function next() { document.getElementById('timer').innerText = "30"; ws.send(JSON.stringify({type: "NEXT"})); }

        document.getElementById('csv').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const rows = ev.target.result.split('\n').slice(1);
                const pk = rows.map(l => {
                    const c = l.split(',');
                    return {title:c[0], type:c[1], correct:c[2], pts:c[3], pen:c[4], med:c[5], choices: [c[6],c[7],c[8],c[9]].join('|')};
                });
                ws.send(JSON.stringify({type: "LOAD", payload: pk}));
                alert("Quiz Loaded!");
            };
            r.readAsText(e.target.files[0]);
        };
        init();
    </script>
</body>
</html>
