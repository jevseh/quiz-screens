<!DOCTYPE html>
<html>
<head>
    <title>Quizmaster Hub</title>
    <style>
        body { background: #0b0e14; color: #adbac7; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1c2128; padding: 30px; border-radius: 15px; border: 1px solid #444; display: inline-block; min-width: 400px; }
        #timer { font-size: 8rem; color: #00e676; margin: 10px 0; font-weight: bold; }
        button { padding: 15px 25px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; margin: 5px; font-size: 1.1rem; width: 200px; }
        .btn-start { background: #238636; }
        .btn-load { background: #444; }
        .btn-next { background: #007bff; }
        #feed { margin-top: 20px; text-align: left; background: #000; padding: 15px; border-radius: 10px; color: #00e676; font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="code">ROOM: ----</h1>
        <div id="timer">30</div>
        <button class="btn-start" onclick="startClock()">🚀 START CLOCK</button><br>
        <button class="btn-next" onclick="nextQ()">➡️ NEXT QUESTION</button><br>
        <button class="btn-load" onclick="document.getElementById('csv').click()">📁 UPLOAD CSV</button>
        <input type="file" id="csv" style="display:none">
        
        <h3>Hazing Feed (Connected Teams)</h3>
        <div id="feed">Waiting for players...</div>
    </div>

    <script>
        let ws, room, tInt;
        
        async function init() {
            const res = await fetch('https://my-pub-quiz.onrender.com/create-room');
            const data = await res.json();
            room = data.room_code;
            document.getElementById('code').innerText = "ROOM: " + room;
            
            ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/master/M`);
            
            // Listen for players joining
            ws.onmessage = (e) => {
                const m = JSON.parse(e.data);
                if(m.type === "UP") {
                    let h = "";
                    for(let t in m.teams) {
                        h += `> ${t}: ${m.teams[t].s} points<br>`;
                    }
                    document.getElementById('feed').innerHTML = h;
                }
            };
        }

        function startClock() {
            let s = 30;
            clearInterval(tInt);
            document.getElementById('timer').style.color = "#00e676";
            
            // This part makes the numbers move on your screen!
            tInt = setInterval(() => {
                s--;
                document.getElementById('timer').innerText = s;
                if(s <= 5) document.getElementById('timer').style.color = "red";
                if(s <= 0) {
                    clearInterval(tInt);
                    alert("Time is up!");
                }
            }, 1000);

            // This tells the players' phones to show the question
            ws.send(JSON.stringify({type: "START", pts: 10, pen: 0}));
        }

        function nextQ() {
            document.getElementById('timer').innerText = "30";
            ws.send(JSON.stringify({type: "NEXT"}));
        }

        document.getElementById('csv').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const rows = ev.target.result.split('\n').slice(1);
                const pk = rows.map(l => {
                    const c = l.split(',');
                    return {title:c[0], type:c[1], correct:c[2], pts:c[3], pen:c[4], med:c[5], choices: [c[6],c[7],c[8],c[9]].join('|')};
                });
                ws.send(JSON.stringify({type: "LOAD", payload: pk}));
                alert("Quiz Loaded!");
            };
            r.readAsText(e.target.files[0]);
        };
        init();
    </script>
</body>
</html>
