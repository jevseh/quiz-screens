<!DOCTYPE html>
<html>
<head>
    <title>Master Hub - Live Quiz</title>
    <style>
        body { background: #0b0e14; color: #adbac7; font-family: sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        .side { width: 320px; border-right: 1px solid #333; padding: 20px; background: #1c2128; overflow-y: auto; }
        .main { flex: 1; padding: 30px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Question Display Box */
        #q-view { background: #1c2128; border: 2px solid #444; border-radius: 15px; padding: 25px; width: 80%; margin-bottom: 20px; min-height: 150px; }
        #q-text { font-size: 2.2rem; color: #fff; margin-bottom: 10px; }
        #q-extra { font-size: 1.2rem; color: #00e676; font-weight: bold; }

        #timer { font-size: 8rem; color: #00e676; margin: 5px 0; line-height: 1; }
        
        .controls button { padding: 15px 25px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; margin: 8px; color: white; font-weight: bold; width: 220px; border: none; transition: 0.2s; }
        .btn-start { background: #238636; }
        .btn-rev { background: #ff9800; }
        .btn-next { background: #007bff; }
        .btn-load { background: #444; width: 180px !important; }
        
        .haze { background: #000; padding: 12px; border-radius: 8px; margin-bottom: 12px; border-left: 5px solid #6200ee; text-align: left; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="side">
        <h3>Live Leaderboard</h3>
        <div id="teams">Waiting for players to join...</div>
        <hr style="border:0.5px solid #333; margin: 20px 0;">
        <button class="btn-load" onclick="document.getElementById('csv').click()">📁 LOAD CSV</button>
        <input type="file" id="csv" style="display:none">
    </div>

    <div class="main">
        <h2 id="code" style="color: #6200ee; margin-top: 0;">ROOM: ----</h2>
        
        <div id="q-view">
            <div id="q-text">Upload a Quiz to Start</div>
            <div id="q-extra"></div>
        </div>

        <div id="timer">30</div>

        <div class="controls">
            <button class="btn-start" onclick="start()">🚀 START CLOCK</button><br>
            <button class="btn-rev" onclick="reveal()">👁️ REVEAL ANSWER</button><br>
            <button class="btn-next" onclick="next()">➡️ NEXT QUESTION</button>
        </div>
    </div>

    <script>
        let ws, room, tInt, currentQData = null;

        async function init() {
            // Wake up Render
            const res = await fetch('https://my-pub-quiz.onrender.com/create-room');
            const data = await res.json();
            room = data.room_code;
            document.getElementById('code').innerText = "ROOM: " + room;

            // Connect WebSocket
            ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/master/M`);
            
            ws.onmessage = (e) => {
                const m = JSON.parse(e.data);
                
                // When a new question is sent to players, show it here too!
                if (m.type === "NEW_Q") {
                    currentQData = m.q;
                    document.getElementById('q-text').innerText = m.q.title;
                    document.getElementById('q-extra').innerText = "Correct Answer: " + m.q.correct;
                    document.getElementById('q-extra').style.color = "#00e676";
                }

                // Update the team scores and answer feed
                if (m.type === "UP") {
                    let h = "";
                    for(let t in m.teams) {
                        const last = m.teams[t].h[m.teams[t].h.length-1];
                        const status = last ? (last.is_c ? '✅' : '❌') : '⌛';
                        h += `<div class="haze"><b>${t}</b>: ${m.teams[t].s} points<br>Last Answer: ${status} ${last ? last.ans : '...'}</div>`;
                    }
                    document.getElementById('teams').innerHTML = h || "No teams joined yet...";
                }
            };
        }

        function start() {
            let s = 30;
            clearInterval(tInt);
            document.getElementById('timer').style.color = "#00e676";
            tInt = setInterval(() => {
                s--;
                document.getElementById('timer').innerText = s;
                if(s <= 5) document.getElementById('timer').style.color = "red";
                if(s <= 0) clearInterval(tInt);
            }, 1000);
            ws.send(JSON.stringify({type: "START", pts: 10, pen: 0}));
        }

        function reveal() {
            clearInterval(tInt);
            ws.send(JSON.stringify({type: "REVEAL"}));
        }

        function next() {
            document.getElementById('timer').innerText = "30";
            document.getElementById('timer').style.color = "#00e676";
            ws.send(JSON.stringify({type: "NEXT"}));
        }

        // CSV Loader
        document.getElementById('csv').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const rows = ev.target.result.split('\n').slice(1);
                const pk = rows.map(l => {
                    const c = l.split(',');
                    // Correcting indices based on your CSV structure
                    return {
                        title: c[0], 
                        type: c[1], 
                        correct: c
