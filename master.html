<!DOCTYPE html>
<html>
<head>
    <title>Quizmaster Hub</title>
    <style>
        body { background: #0b0e14; color: #adbac7; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { background: #1c2128; padding: 30px; border-radius: 15px; border: 1px solid #444; display: inline-block; min-width: 300px; }
        #timer { font-size: 5rem; color: #00e676; margin: 20px 0; }
        button { padding: 15px 30px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; margin: 10px; font-size: 1.1rem; }
        .btn-start { background: #238636; }
        .btn-load { background: #444; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="code">ROOM: ----</h1>
        <div id="timer">30</div>
        <button class="btn-start" onclick="start()">🚀 START CLOCK</button><br>
        <button class="btn-load" onclick="document.getElementById('csv').click()">📁 UPLOAD CSV</button>
        <input type="file" id="csv" style="display:none">
    </div>

    <script>
        let ws, room;
        async function init() {
            // Wake up the brain
            const res = await fetch('https://my-pub-quiz.onrender.com/create-room');
            const data = await res.json();
            room = data.room_code;
            document.getElementById('code').innerText = "ROOM: " + room;

            // Open the live connection
            ws = new WebSocket(`wss://my-pub-quiz.onrender.com/ws/${room}/master/M`);
        }

        function start() {
            ws.send(JSON.stringify({type: "START", pts: 10, pen: 0}));
        }

        document.getElementById('csv').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const rows = ev.target.result.split('\n').slice(1);
                const pk = rows.map(line => {
                    const c = line.split(',');
                    return {title:c[0], type:c[1], correct:c[2], pts:c[3], pen:c[4], med:c[5], choices: [c[6],c[7],c[8],c[9]].join('|')};
                });
                ws.send(JSON.stringify({type: "LOAD", payload: pk}));
                alert("Quiz Loaded!");
            };
            r.readAsText(e.target.files[0]);
        };
        init();
    </script>
</body>
</html>
